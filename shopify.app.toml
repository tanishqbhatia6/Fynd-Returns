# Fynd Returns — Enterprise Returns Management for Shopify
name = "Fynd Returns"
client_id = "2cfa0f8846589d9e5c39500758697b1a"
application_url = "https://returnpromax-web-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_orders,write_orders,read_products,read_customers,read_fulfillments,write_fulfillments,write_returns,read_locations,read_draft_orders"

[auth]
redirect_urls = [
  "https://returnpromax-web-production.up.railway.app/auth/callback",
  "https://returnpromax-web-production.up.railway.app/auth/shopify/callback"
]

[webhooks]
api_version = "2026-01"

# GDPR mandatory compliance webhooks
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "/webhooks"

[[webhooks.subscriptions]]
uri = "/webhooks/app/uninstalled"
topics = ["app/uninstalled"]

[[webhooks.subscriptions]]
uri = "/webhooks/app/scopes_update"
topics = ["app/scopes_update"]

[[webhooks.subscriptions]]
uri = "/webhooks/orders/create"
topics = ["orders/create"]

[[webhooks.subscriptions]]
uri = "/webhooks/draft-orders/create"
topics = ["draft_orders/create"]

[[webhooks.subscriptions]]
uri = "/webhooks/draft-orders/update"
topics = ["draft_orders/update"]

[app_proxy]
url = "https://returnpromax-web-production.up.railway.app/apps/returns"
subpath = "returns"
prefix = "apps"
