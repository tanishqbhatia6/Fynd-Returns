      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
    }

    .rpm-rail-metric span,
    .rpm-kv span {
      color: var(--rpm-ref-muted);
      letter-spacing: 0;
    }

    .rpm-rail-metric:hover {
      border-color: color-mix(in srgb, var(--rpm-ref-primary) 38%, transparent);
      box-shadow: var(--rpm-ref-shadow-glow);
    }

    .rpm-workbench {
      border-radius: 8px;
      min-width: 0;
      overflow: hidden;
      order: 2;
    }

    .rpm-two-col {
      grid-template-columns: 1fr;
    }

    .rpm-summary-panel {
      position: static;
    }

    .rpm-tabs {
      padding: 8px;
      gap: 4px;
      border-bottom-color: rgba(27, 36, 48, 0.1);
      background: rgba(248, 250, 247, 0.72);
    }

    .rpm-tab {
      min-height: 46px;
      border-radius: 8px;
      color: var(--rpm-ref-muted);
      font-weight: 600;
    }

    .rpm-tab:hover {
      color: var(--rpm-ref-foreground);
      background: rgba(255, 255, 255, 0.72);
    }

    .rpm-tab.is-active {
      border-color: color-mix(in srgb, var(--rpm-ref-primary) 36%, transparent);
      background: #ffffff;
      color: var(--rpm-ref-foreground);
      box-shadow: 0 12px 24px -20px rgba(27, 36, 48, 0.42);
    }

    .rpm-tab.is-active svg {
      color: var(--rpm-ref-primary);
    }

    .rpm-workbench-body {
      padding: clamp(22px, 4vw, 34px);
      background: rgba(255, 255, 255, 0.7);
    }

    .rpm-section-head {
      border-bottom-color: rgba(27, 36, 48, 0.1);
    }

    .rpm-section-title {
      color: var(--rpm-ref-foreground);
      font-size: 1.45rem;
      font-weight: 700;
    }

    .rpm-icon-box {
      border-color: rgba(27, 36, 48, 0.1);
      background: #fff;
      color: var(--rpm-ref-primary);
    }

    .rpm-label {
      color: var(--rpm-ref-foreground);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .rpm-input,
    .rpm-select,
    .rpm-textarea {
      min-height: 48px;
      border-color: var(--rpm-ref-input);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-input::placeholder,
    .rpm-textarea::placeholder {
      color: rgba(102, 112, 133, 0.72);
    }

    .rpm-input:focus,
    .rpm-select:focus,
    .rpm-textarea:focus {
      border-color: transparent;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--rpm-ref-primary) 46%, transparent);
    }

    .rpm-button {
      min-height: 48px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
      color: var(--rpm-ref-on-primary);
      font-weight: 700;
      box-shadow: var(--rpm-ref-shadow-glow);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .rpm-button:hover:not(:disabled) {
      opacity: 0.94;
      transform: translateY(-1px);
      background: linear-gradient(135deg, var(--portal-primary-hover), var(--rpm-ref-primary));
    }

    .rpm-button.secondary,
    .rpm-button.ghost {
      border-color: rgba(27, 36, 48, 0.1);
      background: rgba(255, 255, 255, 0.84);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-button.secondary:hover:not(:disabled),
    .rpm-button.ghost:hover:not(:disabled) {
      background: color-mix(in srgb, var(--rpm-ref-primary) 8%, #ffffff);
    }

    .rpm-button.danger {
      background: var(--rpm-ref-danger);
      color: #fff;
    }

    .rpm-result-card,
    .rpm-panel {
      padding: 20px;
    }

    .rpm-card-title,
    .rpm-item-title,
    .rpm-kv strong,
    .rpm-rail-metric strong {
      color: var(--rpm-ref-foreground);
    }

    .rpm-kv,
    .rpm-item-row,
    .rpm-select-control,
    .rpm-choice-card,
    .rpm-upload,
    .rpm-step,
    .rpm-empty {
      border-color: rgba(27, 36, 48, 0.1);
      background: rgba(255, 255, 255, 0.78);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-kv,
    .rpm-select-control,
    .rpm-choice-card,
    .rpm-step {
      border-radius: 8px;
    }

    .rpm-select-control[data-checked],
    .rpm-choice-card[data-checked],
    .rpm-step.is-active {
      border-color: color-mix(in srgb, var(--rpm-ref-primary) 48%, transparent);
      background: color-mix(in srgb, var(--rpm-ref-primary) 10%, #ffffff);
      color: var(--rpm-ref-primary);
      box-shadow: none;
    }

    .rpm-thumb {
      border-color: rgba(27, 36, 48, 0.1);
      background: #f8faf7;
    }

    .rpm-badge {
      border-color: rgba(27, 36, 48, 0.1);
      background: rgba(255, 255, 255, 0.78);
      color: var(--rpm-ref-muted);
    }

    .rpm-badge.ok,
    .rpm-success {
      border-color: rgba(19, 138, 91, 0.28);
      background: rgba(236, 253, 245, 0.92);
      color: var(--rpm-ref-success);
    }

    .rpm-badge.info,
    .rpm-note {
      border-color: rgba(37, 99, 235, 0.24);
      background: rgba(239, 246, 255, 0.92);
      color: #1d4ed8;
    }

    .rpm-badge.warn {
      border-color: color-mix(in srgb, var(--rpm-ref-warning) 34%, transparent);
      background: rgba(255, 251, 235, 0.92);
      color: #a16207;
    }

    .rpm-badge.danger,
    .rpm-error {
      border-color: rgba(194, 65, 53, 0.24);
      background: rgba(254, 242, 242, 0.92);
      color: var(--rpm-ref-danger);
    }

    .rpm-upload {
      background: color-mix(in srgb, var(--rpm-ref-primary) 7%, #ffffff);
    }

    .rpm-upload em {
      background: rgba(254, 242, 242, 0.92);
      color: var(--rpm-ref-danger);
    }

    .rpm-skeleton-line {
      background: linear-gradient(90deg, rgba(27, 36, 48, 0.05), rgba(27, 36, 48, 0.12), rgba(27, 36, 48, 0.05));
      background-size: 200% 100%;
    }

    .rpm-toast {
      border-color: rgba(27, 36, 48, 0.1);
      background: rgba(255, 255, 255, 0.96);
      color: var(--rpm-ref-foreground);
      box-shadow: var(--rpm-ref-shadow-card);
      backdrop-filter: blur(14px);
    }

    .rpm-submit-animation {
      display: grid;
      justify-items: center;
      gap: 14px;
      margin: 0 auto 18px;
      padding: 18px 16px 16px;
      border: 1px solid rgba(19, 138, 91, 0.2);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 0%, rgba(19, 138, 91, 0.14), transparent 46%),
        rgba(255, 255, 255, 0.88);
      text-align: center;
      box-shadow: var(--rpm-ref-shadow-card);
      animation: rpm-submit-card 0.34s ease-out both;
    }

    .rpm-submit-orbit {
      position: relative;
      width: 118px;
      height: 118px;
      display: grid;
      place-items: center;
    }

    .rpm-submit-orbit::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px dashed rgba(19, 138, 91, 0.28);
      border-radius: 999px;
      animation: rpm-submit-orbit 9s linear infinite;
    }

    .rpm-submit-core {
      position: relative;
      z-index: 2;
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(19, 138, 91, 0.34);
      border-radius: 999px;
      background: linear-gradient(135deg, #138a5b, #58c792);
      color: #fff;
      box-shadow: 0 18px 34px -22px rgba(19, 138, 91, 0.8);
      animation: rpm-submit-pop 0.42s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .rpm-submit-node {
      position: absolute;
      z-index: 1;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--rpm-ref-primary) 24%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--rpm-ref-primary) 8%, #ffffff);
      color: var(--rpm-ref-primary);
      box-shadow: 0 14px 28px -22px rgba(27, 36, 48, 0.5);
      animation: rpm-submit-node 0.38s ease-out both;
    }

    .rpm-submit-node.node-one {
      top: 4px;
      left: 16px;
      animation-delay: 0.1s;
    }

    .rpm-submit-node.node-two {
      right: 4px;
      top: 42px;
      animation-delay: 0.16s;
    }

    .rpm-submit-node.node-three {
      bottom: 4px;
      left: 26px;
      animation-delay: 0.22s;
    }

    .rpm-submit-copy {
      display: grid;
      gap: 5px;
    }

    .rpm-submit-kicker {
      margin: 0;
      color: var(--rpm-ref-success);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .rpm-submit-copy h2 {
      margin: 0;
      color: var(--rpm-ref-foreground);
      font-family: var(--portal-heading-font);
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .rpm-submit-copy p:last-child {
      margin: 0;
      color: var(--rpm-ref-muted);
      font-size: 0.92rem;
    }

    .rpm-success-section .rpm-section-head {
      margin-bottom: 14px;
    }

    .rpm-success-card {
      padding: 18px;
    }

    @keyframes rpm-submit-card {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes rpm-submit-pop {
      0% {
        opacity: 0;
        transform: scale(0.72);
      }
      72% {
        opacity: 1;
        transform: scale(1.08);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rpm-submit-node {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.84);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes rpm-submit-orbit {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rpm-delivery-road::after,
      .rpm-delivery-node,
      .rpm-delivery-van,
      .rpm-delivery-parcel,
      .rpm-commerce-token,
      .rpm-submit-animation,
      .rpm-submit-core,
      .rpm-submit-node,
      .rpm-submit-orbit::before {
        animation: none;
      }

      .rpm-delivery-van {
        opacity: 1;
        transform: translate3d(calc(var(--rpm-delivery-drive) * 0.48), -50%, 0);
      }
    }

    @media (max-width: 900px) {
      .rpm-rail {
        grid-template-columns: 1fr;
        order: 1;
      }

      .rpm-rail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      html,
      body,
      #return-portal-root {
        max-width: 100%;
        overflow-x: hidden;
      }

      .rpm-shell {
        width: min(100%, 1152px);
        padding-top: 12px;
        overflow: hidden;
      }

      .rpm-boot-fallback,
      .rpm-nojs {
        width: min(100%, 1152px);
        padding-top: 12px;
        overflow: hidden;
      }

      .rpm-brand-row {
        min-height: 58px;
        padding-right: 12px;
        padding-left: 12px;
        justify-content: flex-start;
        gap: 12px;
      }

      .rpm-brand-name {
        max-width: 210px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rpm-brand-shop {
        display: none;
      }

      .rpm-hero-main {
        min-height: auto;
        padding: 20px 16px 18px;
      }

      .rpm-hero-copy-block {
        width: 100%;
        min-width: 0;
        max-width: 100%;
      }

      .rpm-hero h1 {
        max-width: 300px;
        font-size: clamp(1.65rem, 7.2vw, 2rem);
        line-height: 1.08;
      }

      .rpm-hero-copy {
        max-width: 300px;
        font-size: 0.9rem;
      }

      .rpm-hero-status {
        display: grid;
        grid-template-columns: 1fr;
        justify-content: stretch;
        max-width: 100%;
        width: min(100%, 260px);
        margin-right: auto;
        margin-left: auto;
      }

      .rpm-status-chip {
        justify-content: center;
        white-space: normal;
      }

      .rpm-journey-strip {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .rpm-delivery-motion {
        --rpm-delivery-drive: 218px;
        width: min(300px, 100%);
        height: 48px;
        margin-top: 10px;
      }

      .rpm-delivery-node {
        width: 28px;
        height: 28px;
      }

      .rpm-delivery-node-start {
        left: 14px;
      }

      .rpm-delivery-node-end {
        right: 14px;
      }

      .rpm-delivery-road {
        right: 16px;
        left: 16px;
      }

      .rpm-delivery-van {
        left: 42px;
        width: 38px;
        height: 28px;
      }

      .rpm-delivery-parcel-three {
        display: none;
      }

      .rpm-commerce-token {
        width: 22px;
        height: 22px;
      }

      .rpm-commerce-cart {
        left: 17%;
      }

      .rpm-commerce-bag {
        left: 40%;
      }

      .rpm-commerce-card {
        right: 29%;
      }

      .rpm-commerce-receipt {
        right: 12%;
      }

      .rpm-rail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .rpm-rail-metric {
        min-height: 88px;
      }

      .rpm-workbench,
      .rpm-rail-card,
      .rpm-rail-metric,
      .rpm-result-card,
      .rpm-panel {
        border-radius: 8px;
      }

      .rpm-workbench {
        order: 2;
      }

      .rpm-tabs {
        display: grid;
        grid-template-columns: 1fr;
      }

      .rpm-layout,
      .rpm-workbench,
      .rpm-workbench-body,
      .rpm-section-head,
      .rpm-section-copy {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .rpm-workbench-body {
        overflow: hidden;
      }

      .rpm-section-copy {
        max-width: 310px;
        overflow-wrap: break-word;
      }

      .rpm-form-grid {
        grid-template-columns: 1fr;
      }

      .rpm-form-grid .rpm-button,
      .rpm-footer-actions .rpm-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="return-portal-root"
    data-shop="%SHOP%"
    data-app-url="%APP_URL%"
    data-return-window="%RETURN_WINDOW%"
    data-brand-logo-url="%BRAND_LOGO_URL%">
    <noscript>
      <section class="rpm-nojs">
        <h1>Returns and order tracking</h1>
        <p>This portal needs JavaScript to look up orders and returns. Enable JavaScript and reload this page.</p>
      </section>
    </noscript>
    <section class="rpm-boot-fallback" aria-live="polite">
      <div class="rpm-brand-row">
        <div class="rpm-brand-mark">
          <span>F</span>
        </div>
        <div>
          <div class="rpm-brand-name">Fynd Returns</div>
          <div class="rpm-brand-shop">%SHOP%</div>
        </div>
      </div>
      <div class="rpm-hero-main">
        <div class="rpm-hero-copy-block">
          <h1>Returns and order tracking</h1>
          <p class="rpm-hero-copy">Loading your return portal...</p>
        </div>
      </div>
    </section>
  </div>
  <script>
    window.setTimeout(function () {
      var root = document.getElementById("return-portal-root");
      var fallback = root && root.querySelector(".rpm-boot-fallback .rpm-hero-copy");
      if (fallback) {
        fallback.textContent = "Portal could not load. Refresh the page or contact the store.";
      }
    }, 4500);
  </script>

  <template id="rpm-return-policy">%RETURN_POLICY%</template>
  <script type="application/json" id="rpm-return-reasons">%RETURN_REASONS_JSON%</script>
  <script type="application/json" id="rpm-return-reasons-by-category">%RETURN_REASONS_BY_CATEGORY_JSON%</script>
  <script type="application/json" id="rpm-portal-config">%PORTAL_CONFIG%</script>
  <script src="%APP_URL%/portal/return-portal.js?v=%PORTAL_ASSET_VERSION%" defer></script>
</body>

</html>
