# Render Blueprint for Fynd Returns
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: returnpromax
    runtime: node
    region: oregon

    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: returnpromax-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_orders,write_orders,read_products,read_customers,read_fulfillments,write_fulfillments,write_returns,read_locations
      - key: SHOPIFY_APP_URL
        sync: false
      - key: PORTAL_JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true

databases:
  - name: returnpromax-db
    databaseName: returnpromax
    plan: free
