<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returns Portal</title>
  <!-- %FAVICON% -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --portal-primary: %PRIMARY_COLOR%;
      --portal-primary-hover: %PRIMARY_HOVER%;
      --portal-bg: %BG_COLOR%;
      --portal-surface: %SURFACE_COLOR%;
      --portal-text: %TEXT_COLOR%;
      --portal-text-muted: %TEXT_MUTED%;
      --portal-border: %BORDER_COLOR%;
      --portal-font: %FONT_FAMILY%;
      --portal-heading-font: %HEADING_FONT%;
      --portal-radius: min(%BORDER_RADIUS%, 8px);
      --portal-shadow: %SHADOW%;
      --portal-primary-contrast: %PRIMARY_CONTRAST%;
      --portal-primary-soft: color-mix(in srgb, var(--portal-primary) 9%, var(--portal-surface));
      --portal-primary-tint: color-mix(in srgb, var(--portal-primary) 15%, transparent);
      --portal-primary-accent: color-mix(in srgb, var(--portal-primary) 62%, #f4b84f);
      --portal-primary-shadow: color-mix(in srgb, var(--portal-primary) 55%, transparent);
      --rpm-green: #047857;
      --rpm-green-bg: #ecfdf5;
      --rpm-blue: #1d4ed8;
      --rpm-blue-bg: #eff6ff;
      --rpm-amber: #b45309;
      --rpm-amber-bg: #fffbeb;
      --rpm-red: #b91c1c;
      --rpm-red-bg: #fef2f2;
      --rpm-ink: #111827;
      --rpm-line: color-mix(in srgb, var(--portal-border) 82%, #cbd5e1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      min-height: 100%;
      background-color: color-mix(in srgb, var(--portal-bg) 90%, #e8f3ef);
      color: var(--portal-text);
      font-family: var(--portal-font, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      overflow-x: hidden;
    }

    body {
      position: relative;
      margin: 0;
      min-height: 100svh;
      background: transparent;
      color: var(--portal-text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: color-mix(in srgb, var(--portal-bg) 90%, #e8f3ef);
      background-image:
        conic-gradient(from 90deg at 1px 1px,
          color-mix(in srgb, var(--portal-primary) 12%, #dfeee9) 25%,
          color-mix(in srgb, var(--portal-bg) 88%, #ffffff) 0 50%,
          color-mix(in srgb, var(--portal-primary) 12%, #dfeee9) 0 75%,
          color-mix(in srgb, var(--portal-bg) 88%, #ffffff) 0);
      background-position: 0 0;
      background-size: 34px 34px;
    }

    #return-portal-root {
      position: relative;
      z-index: 1;
      min-height: 100svh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    a {
      color: inherit;
    }

    .rpm-shell {
      position: relative;
      width: min(1420px, calc(100% - 56px));
      min-height: 100svh;
      margin: 0 auto;
      padding: clamp(12px, 2.2vh, 24px) 0;
      display: flex;
      flex-direction: column;
    }

    .rpm-icon-box {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
      color: var(--portal-primary);
    }

    .rpm-hero {
      position: relative;
      z-index: 1;
      display: block;
      margin-bottom: 18px;
    }

    .rpm-floating-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .rpm-float-mark {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 22%, var(--rpm-line));
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--portal-surface) 92%, transparent), color-mix(in srgb, var(--portal-primary) 6%, var(--portal-surface))),
        var(--portal-surface);
      color: color-mix(in srgb, var(--portal-primary) 86%, var(--portal-text));
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      opacity: 0.58;
      animation: rpm-float 7s ease-in-out infinite;
    }

    .rpm-float-one {
      top: 18%;
      left: max(18px, 5vw);
      transform: rotate(-8deg);
    }

    .rpm-float-two {
      top: 10%;
      right: max(18px, 6vw);
      width: 58px;
      height: 58px;
      transform: rotate(10deg);
      animation-delay: -2s;
    }

    .rpm-float-three {
      top: 38%;
      left: max(16px, 3vw);
      width: 42px;
      height: 42px;
      transform: rotate(7deg);
      animation-delay: -4s;
    }

    .rpm-float-four {
      top: 68%;
      right: max(22px, 7vw);
      width: 44px;
      height: 44px;
      transform: rotate(-12deg);
      animation-delay: -1s;
    }

    .rpm-float-five {
      top: 78%;
      left: max(28px, 10vw);
      width: 56px;
      height: 56px;
      transform: rotate(13deg);
      animation-delay: -3.2s;
    }

    .rpm-float-six {
      top: 42%;
      right: max(20px, 3vw);
      width: 42px;
      height: 42px;
      transform: rotate(-6deg);
      animation-delay: -5.2s;
    }

    .rpm-float-seven {
      top: 58%;
      left: max(18px, 16vw);
      transform: rotate(9deg);
      animation-delay: -2.7s;
    }

    .rpm-float-eight {
      top: 84%;
      right: max(18px, 14vw);
      width: 52px;
      height: 52px;
      transform: rotate(-10deg);
      animation-delay: -4.7s;
    }

    .rpm-float-nine {
      top: 8%;
      left: max(24px, 18vw);
      width: 40px;
      height: 40px;
      transform: rotate(14deg);
      animation-delay: -6s;
    }

    .rpm-float-ten {
      top: 26%;
      right: max(24px, 18vw);
      width: 46px;
      height: 46px;
      transform: rotate(7deg);
      animation-delay: -1.8s;
    }

    .rpm-float-eleven {
      top: 54%;
      right: max(18px, 23vw);
      width: 40px;
      height: 40px;
      transform: rotate(-14deg);
      animation-delay: -3.8s;
    }

    .rpm-float-twelve {
      top: 88%;
      left: max(18px, 32vw);
      width: 44px;
      height: 44px;
      transform: rotate(11deg);
      animation-delay: -5.8s;
    }

    .rpm-float-thirteen {
      top: 30%;
      left: max(18px, 24vw);
      width: 36px;
      height: 36px;
      transform: rotate(6deg);
      animation-delay: -2.4s;
    }

    .rpm-float-fourteen {
      top: 76%;
      right: max(18px, 30vw);
      width: 38px;
      height: 38px;
      transform: rotate(-7deg);
      animation-delay: -4.4s;
    }

    @keyframes rpm-float {
      0%,
      100% {
        translate: 0 0;
      }

      50% {
        translate: 0 -12px;
      }
    }

    .rpm-hero-main,
    .rpm-panel,
    .rpm-result-card,
    .rpm-toast {
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-surface) 96%, transparent);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.07);
    }

    .rpm-hero-main {
      padding: clamp(20px, 3.2vw, 34px);
      min-height: 250px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
      gap: clamp(18px, 4vw, 52px);
      align-items: center;
      background:
        radial-gradient(circle at 90% 10%, color-mix(in srgb, var(--portal-primary) 13%, transparent), transparent 26%),
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface)) 0%, color-mix(in srgb, var(--portal-surface) 96%, transparent) 62%),
        linear-gradient(90deg, color-mix(in srgb, var(--portal-primary) 3%, transparent) 1px, transparent 1px),
        linear-gradient(0deg, color-mix(in srgb, var(--portal-primary) 3%, transparent) 1px, transparent 1px),
        var(--portal-surface);
      background-size: auto, auto, 28px 28px, 28px 28px;
      overflow: hidden;
    }

    .rpm-hero-copy-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      max-width: 820px;
    }

    .rpm-brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      min-width: 0;
    }

    .rpm-brand-mark {
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 24%, var(--rpm-line));
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 10%, var(--portal-surface)), var(--portal-surface));
      color: var(--portal-primary);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .rpm-brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 7px;
    }

    .rpm-brand-name {
      font-size: 1rem;
      line-height: 1.15;
      font-weight: 850;
      color: var(--portal-text);
    }

    .rpm-brand-shop {
      margin-top: 3px;
      max-width: min(420px, 58vw);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.86rem;
      font-weight: 650;
      color: var(--portal-text-muted);
    }

    .rpm-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin-bottom: 14px;
      padding: 6px 9px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 26%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
      color: var(--portal-primary);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .rpm-hero h1 {
      margin: 0;
      max-width: 660px;
      font-family: var(--portal-heading-font, Inter, system-ui, sans-serif);
      font-size: clamp(2rem, 4.2vw, 4.25rem);
      line-height: 1.08;
      font-weight: 850;
      letter-spacing: 0;
      color: var(--portal-text);
    }

    .rpm-hero-copy {
      margin: 14px 0 0;
      max-width: 620px;
      color: var(--portal-text-muted);
      font-size: clamp(1rem, 1.7vw, 1.22rem);
    }

    .rpm-policy {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 18px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 20%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 5%, var(--portal-surface));
      color: var(--portal-text-muted);
      font-size: 0.9rem;
    }

    .rpm-hero-visual {
      position: relative;
      display: grid;
      gap: 14px;
      justify-self: stretch;
      max-width: 520px;
      margin-left: auto;
    }

    .rpm-hero-visual::before {
      content: "";
      position: absolute;
      inset: -28px -18px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--portal-primary) 7%, transparent) 1px, transparent 1px),
        linear-gradient(0deg, color-mix(in srgb, var(--portal-primary) 7%, transparent) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(90deg, transparent, #000 18%, #000 82%, transparent);
      opacity: 0.72;
    }

    .rpm-visual-card {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 20%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-surface) 94%, transparent);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.09);
    }

    .rpm-visual-card-main {
      transform: translateX(-22px);
    }

    .rpm-visual-icon {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 28%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
      color: var(--portal-primary);
    }

    .rpm-visual-card span {
      display: block;
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--portal-text-muted);
    }

    .rpm-visual-card strong {
      display: block;
      margin-top: 3px;
      font-size: 1.08rem;
      line-height: 1.2;
      color: var(--portal-text);
    }

    .rpm-visual-card em {
      justify-self: end;
      padding: 5px 9px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 30%, var(--rpm-line));
      border-radius: 999px;
      background: color-mix(in srgb, var(--portal-primary) 9%, var(--portal-surface));
      color: var(--portal-primary);
      font-size: 0.8rem;
      font-style: normal;
      font-weight: 850;
    }

    .rpm-visual-lines {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 0.8fr 1fr 0.65fr;
      gap: 10px;
      padding: 0 34px;
    }

    .rpm-visual-lines span {
      height: 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--portal-primary) 28%, var(--portal-border));
    }

    .rpm-visual-lines span:first-child {
      background: var(--portal-primary);
    }

    .rpm-workbench {
      position: relative;
      z-index: 1;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-surface) 95%, transparent);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .rpm-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      border-bottom: 1px solid var(--rpm-line);
      background: color-mix(in srgb, var(--portal-bg) 70%, var(--portal-surface));
    }

    .rpm-tab {
      min-height: 54px;
      border: 0;
      border-right: 1px solid var(--rpm-line);
      background: transparent;
      color: var(--portal-text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .rpm-tab:focus-visible,
    .rpm-button:focus-visible,
    .rpm-select-control:focus-visible,
    .rpm-choice-card:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--portal-primary) 18%, transparent);
      outline-offset: 2px;
    }

    .rpm-tab:last-child {
      border-right: 0;
    }

    .rpm-tab.is-active {
      background: color-mix(in srgb, var(--portal-primary) 4%, var(--portal-surface));
      color: var(--portal-primary);
      box-shadow: inset 0 -2px 0 var(--portal-primary);
    }

    .rpm-workbench-body {
      padding: 22px;
    }

    .rpm-section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .rpm-section-title {
      margin: 0;
      font-size: 1.28rem;
      line-height: 1.2;
      font-weight: 800;
      color: var(--portal-text);
    }

    .rpm-section-copy {
      margin: 5px 0 0;
      color: var(--portal-text-muted);
      font-size: 0.94rem;
    }

    .rpm-form-grid {
      display: grid;
      grid-template-columns: minmax(180px, 0.42fr) minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .rpm-field {
      display: grid;
      gap: 6px;
    }

    .rpm-label {
      color: var(--portal-text);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .rpm-input,
    .rpm-select,
    .rpm-textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
      color: var(--portal-text);
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .rpm-textarea {
      min-height: 92px;
      resize: vertical;
    }

    .rpm-input:focus,
    .rpm-select:focus,
    .rpm-textarea:focus {
      border-color: var(--portal-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--portal-primary) 15%, transparent);
    }

    .rpm-button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      color: #fff;
      background: var(--portal-primary);
      white-space: nowrap;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .rpm-button:hover:not(:disabled) {
      background: var(--portal-primary-hover);
      transform: translateY(-1px);
    }

    .rpm-button.secondary {
      color: var(--portal-text);
      background: var(--portal-surface);
      border-color: var(--rpm-line);
    }

    .rpm-button.secondary:hover:not(:disabled) {
      background: color-mix(in srgb, var(--portal-text) 5%, var(--portal-surface));
    }

    .rpm-button.danger {
      background: var(--rpm-red);
      color: #fff;
    }

    .rpm-button.ghost {
      border-color: transparent;
      color: var(--portal-primary);
      background: transparent;
    }

    .rpm-button.full {
      width: 100%;
    }

    .rpm-error,
    .rpm-success,
    .rpm-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 12px 0 0;
      padding: 11px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .rpm-error {
      border: 1px solid color-mix(in srgb, var(--rpm-red) 25%, #fecaca);
      background: var(--rpm-red-bg);
      color: var(--rpm-red);
    }

    .rpm-success {
      border: 1px solid color-mix(in srgb, var(--rpm-green) 25%, #bbf7d0);
      background: var(--rpm-green-bg);
      color: var(--rpm-green);
    }

    .rpm-note {
      border: 1px solid color-mix(in srgb, var(--rpm-blue) 20%, #bfdbfe);
      background: var(--rpm-blue-bg);
      color: var(--rpm-blue);
    }

    .rpm-results {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .rpm-result-card {
      padding: 16px;
      box-shadow: none;
    }

    .rpm-success-section .rpm-section-head {
      align-items: center;
      margin-bottom: 16px;
    }

    .rpm-success-card {
      position: relative;
      overflow: hidden;
      padding: 26px 26px 22px;
      border-color: color-mix(in srgb, var(--portal-primary) 24%, var(--rpm-line));
      background:
        radial-gradient(circle at 96% 0%, color-mix(in srgb, var(--portal-primary) 12%, transparent), transparent 34%),
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 5%, var(--portal-surface)), color-mix(in srgb, var(--portal-surface) 96%, transparent)),
        var(--portal-surface);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    .rpm-success-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--portal-primary) 4%, transparent) 1px, transparent 1px),
        linear-gradient(0deg, color-mix(in srgb, var(--portal-primary) 4%, transparent) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.8;
    }

    .rpm-success-badge {
      position: relative;
      z-index: 1;
      width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 32%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 9%, var(--portal-surface));
      color: var(--portal-primary);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.1);
    }

    .rpm-success-card > * {
      position: relative;
      z-index: 1;
    }

    .rpm-success-card .rpm-kv-grid {
      margin-top: 0;
      gap: 10px;
    }

    .rpm-success-card .rpm-kv {
      min-height: 76px;
      background: color-mix(in srgb, var(--portal-surface) 92%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--portal-surface) 56%, transparent);
    }

    .rpm-success-card .rpm-kv strong {
      margin-top: 5px;
      font-size: 1.04rem;
    }

    .rpm-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .rpm-card-title {
      margin: 0;
      color: var(--portal-text);
      font-size: 1rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .rpm-card-meta {
      margin: 3px 0 0;
      color: var(--portal-text-muted);
      font-size: 0.84rem;
    }

    .rpm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--rpm-line);
      background: var(--portal-surface);
      color: var(--portal-text-muted);
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .rpm-badge.ok {
      background: var(--rpm-green-bg);
      color: var(--rpm-green);
      border-color: color-mix(in srgb, var(--rpm-green) 24%, #bbf7d0);
    }

    .rpm-badge.info {
      background: var(--rpm-blue-bg);
      color: var(--rpm-blue);
      border-color: color-mix(in srgb, var(--rpm-blue) 24%, #bfdbfe);
    }

    .rpm-badge.warn {
      background: var(--rpm-amber-bg);
      color: var(--rpm-amber);
      border-color: #fde68a;
    }

    .rpm-badge.danger {
      background: var(--rpm-red-bg);
      color: var(--rpm-red);
      border-color: #fecaca;
    }

    .rpm-kv-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .rpm-kv {
      min-height: 64px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      padding: 10px;
      background: color-mix(in srgb, var(--portal-bg) 45%, var(--portal-surface));
    }

    .rpm-kv span {
      display: block;
      color: var(--portal-text-muted);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .rpm-kv strong {
      display: block;
      margin-top: 2px;
      color: var(--portal-text);
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .rpm-items {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .rpm-item-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
    }

    .rpm-selectable-row {
      grid-template-columns: minmax(104px, auto) 58px minmax(0, 1fr) auto;
    }

    .rpm-item-row.is-disabled {
      background: color-mix(in srgb, var(--portal-text) 4%, var(--portal-surface));
    }

    .rpm-select-control {
      min-height: 38px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      padding: 8px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--portal-surface);
      color: var(--portal-text);
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .rpm-select-control[data-checked] {
      border-color: color-mix(in srgb, var(--portal-primary) 45%, var(--rpm-line));
      background: color-mix(in srgb, var(--portal-primary) 8%, var(--portal-surface));
      color: var(--portal-primary);
    }

    .rpm-select-control:disabled {
      background: color-mix(in srgb, var(--portal-text) 4%, var(--portal-surface));
      color: var(--portal-text-muted);
      cursor: not-allowed;
    }

    .rpm-select-box {
      width: 18px;
      height: 18px;
      border: 1px solid currentColor;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .rpm-thumb {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      border: 1px solid var(--rpm-line);
      background: color-mix(in srgb, var(--portal-bg) 70%, #fff);
      object-fit: cover;
    }

    .rpm-thumb-placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--portal-text-muted);
    }

    .rpm-item-title {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--portal-text);
      overflow-wrap: anywhere;
    }

    .rpm-item-meta {
      margin: 2px 0 0;
      color: var(--portal-text-muted);
      font-size: 0.8rem;
    }

    .rpm-item-status {
      margin: 6px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--rpm-amber);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .rpm-skeleton {
      display: grid;
      gap: 10px;
    }

    .rpm-skeleton-line {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--portal-border), color-mix(in srgb, var(--portal-surface) 70%, #fff), var(--portal-border));
      background-size: 200% 100%;
      animation: rpm-shimmer 1.2s linear infinite;
    }

    .rpm-loading-note {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: var(--portal-text-muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .rpm-spin {
      animation: rpm-spin 0.8s linear infinite;
    }

    @keyframes rpm-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes rpm-shimmer {
      from {
        background-position: 200% 0;
      }
      to {
        background-position: -200% 0;
      }
    }

    .rpm-stepper {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .rpm-step {
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      padding: 10px;
      color: var(--portal-text-muted);
      background: color-mix(in srgb, var(--portal-bg) 48%, var(--portal-surface));
      font-size: 0.82rem;
      font-weight: 800;
    }

    .rpm-step.is-active {
      color: var(--portal-primary);
      border-color: color-mix(in srgb, var(--portal-primary) 38%, var(--rpm-line));
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
    }

    .rpm-two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.42fr);
      gap: 14px;
      align-items: start;
    }

    .rpm-stack {
      display: grid;
      gap: 12px;
    }

    .rpm-upload {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 132px;
      border: 2px dashed color-mix(in srgb, var(--portal-primary) 42%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 6%, var(--portal-surface));
      color: var(--portal-text);
      text-align: center;
      padding: 18px;
    }

    .rpm-upload strong {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
    }

    .rpm-upload em {
      font-style: normal;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--rpm-red-bg);
      color: var(--rpm-red);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .rpm-upload input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .rpm-choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .rpm-choice-card {
      min-height: 78px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
      color: var(--portal-text);
      padding: 12px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      text-align: left;
      cursor: pointer;
    }

    .rpm-choice-card[data-checked] {
      border-color: color-mix(in srgb, var(--portal-primary) 45%, var(--rpm-line));
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
      color: var(--portal-primary);
    }

    .rpm-choice-card strong,
    .rpm-choice-card small {
      display: block;
    }

    .rpm-choice-card small {
      margin-top: 2px;
      color: var(--portal-text-muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .rpm-choice-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid currentColor;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .rpm-footer-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .rpm-empty {
      display: grid;
      place-items: center;
      min-height: 190px;
      text-align: center;
      color: var(--portal-text-muted);
      border: 1px dashed var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-bg) 54%, var(--portal-surface));
      padding: 24px;
    }

    .rpm-toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: min(420px, calc(100vw - 36px));
      color: var(--portal-text);
    }

    @media (max-width: 900px) {
      .rpm-hero-main {
        grid-template-columns: 1fr;
      }

      .rpm-hero-visual {
        width: 100%;
        max-width: none;
        margin-left: 0;
      }

      .rpm-visual-card-main {
        transform: none;
      }

      .rpm-two-col,
      .rpm-form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .rpm-shell {
        width: min(100% - 20px, 1120px);
        padding-top: 14px;
      }

      .rpm-section-head,
      .rpm-card-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .rpm-float-one,
      .rpm-float-three,
      .rpm-float-five,
      .rpm-float-seven,
      .rpm-float-nine {
        display: none;
      }

      .rpm-float-two,
      .rpm-float-four,
      .rpm-float-six,
      .rpm-float-eight,
      .rpm-float-ten,
      .rpm-float-eleven,
      .rpm-float-twelve,
      .rpm-float-thirteen,
      .rpm-float-fourteen {
        opacity: 0.36;
      }

      .rpm-float-two {
        top: 10%;
      }

      .rpm-float-four {
        top: 64%;
      }

      .rpm-float-six {
        top: 38%;
      }

      .rpm-float-eight {
        top: 78%;
      }

      .rpm-float-ten {
        top: 24%;
      }

      .rpm-float-eleven {
        top: 52%;
      }

      .rpm-float-twelve,
      .rpm-float-thirteen,
      .rpm-float-fourteen {
        display: none;
      }

      .rpm-hero-main,
      .rpm-workbench-body {
        padding: 16px;
      }

      .rpm-hero-main {
        min-height: auto;
      }

      .rpm-hero h1 {
        font-size: clamp(1.9rem, 12vw, 2.7rem);
      }

      .rpm-brand-shop {
        max-width: calc(100vw - 120px);
      }

      .rpm-hero-visual {
        display: none;
      }

      .rpm-kv-grid,
      .rpm-stepper,
      .rpm-choice-grid,
      .rpm-item-row {
        grid-template-columns: 1fr;
      }

      .rpm-tabs {
        grid-template-columns: 1fr;
      }

      .rpm-tab {
        justify-content: flex-start;
        border-right: 0;
        border-bottom: 1px solid var(--rpm-line);
      }

      .rpm-tab:last-child {
        border-bottom: 0;
      }

      .rpm-footer-actions .rpm-button,
      .rpm-form-grid .rpm-button {
        width: 100%;
      }
    }

    [dir="rtl"] {
      direction: rtl;
      text-align: right;
    }

    [dir="rtl"] .rpm-tab,
    [dir="rtl"] .rpm-policy,
    [dir="rtl"] .rpm-error,
    [dir="rtl"] .rpm-success,
    [dir="rtl"] .rpm-note {
      flex-direction: row-reverse;
    }

    /* 2026 portal frame: restrained, component-led UI over decorative chrome. */
    html {
      background: #f6f7f9;
      color: var(--portal-text);
    }

    body {
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 12%, transparent) 0 16%, transparent 16% 100%),
        linear-gradient(180deg, color-mix(in srgb, var(--portal-primary) 7%, #f8fafc), #f6f7f9 360px),
        #f6f7f9;
    }

    body::before {
      display: none;
    }

    .rpm-shell {
      width: min(1280px, calc(100% - 48px));
      padding: 28px 0 42px;
      gap: 20px;
    }

    .rpm-hero,
    .rpm-layout,
    .rpm-workbench,
    .rpm-rail,
    .rpm-rail-card,
    .rpm-rail-metric,
    .rpm-panel,
    .rpm-result-card,
    .rpm-toast {
      border-radius: var(--portal-radius);
    }

    .rpm-hero {
      display: grid;
      grid-template-columns: minmax(250px, 0.28fr) minmax(0, 1fr);
      align-items: stretch;
      gap: 18px;
      margin: 0;
    }

    .rpm-brand-row {
      position: relative;
      overflow: hidden;
      margin: 0;
      padding: 22px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 28%, #0f172a);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 80%, #0f172a), #10251f);
      box-shadow: 0 22px 46px rgba(15, 23, 42, 0.16);
      color: #fff;
    }

    .rpm-brand-row::after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -36px;
      width: 138px;
      height: 96px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      transform: rotate(-18deg);
    }

    .rpm-brand-row > * {
      position: relative;
      z-index: 1;
    }

    .rpm-brand-mark {
      width: 48px;
      height: 48px;
      border-color: rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.12);
      color: #ecfdf5;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .rpm-brand-name {
      font-size: 1.08rem;
      letter-spacing: 0;
      color: #fff;
    }

    .rpm-brand-shop {
      max-width: 260px;
      font-size: 0.84rem;
      color: rgba(255, 255, 255, 0.72);
    }

    .rpm-hero-main {
      position: relative;
      isolation: isolate;
      min-height: unset;
      padding: clamp(22px, 3vw, 34px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px 22px;
      align-items: center;
      border: 1px solid var(--rpm-line);
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--portal-primary) 8%, #fff), #fff 54%),
        var(--portal-surface);
      box-shadow: 0 22px 48px rgba(15, 23, 42, 0.1);
      overflow: visible;
    }

    .rpm-hero-main::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      border-radius: var(--portal-radius) 0 0 var(--portal-radius);
      background: linear-gradient(180deg, var(--portal-primary), #2563eb, #d97706);
      z-index: -1;
    }

    .rpm-hero-copy-block {
      max-width: 760px;
    }

    .rpm-hero h1 {
      max-width: none;
      font-size: clamp(1.75rem, 2.7vw, 3rem);
      line-height: 1.05;
      font-weight: 850;
    }

    .rpm-hero-copy {
      max-width: 760px;
      margin-top: 10px;
      font-size: clamp(0.98rem, 1.2vw, 1.08rem);
      line-height: 1.55;
    }

    .rpm-hero-status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      min-width: min(390px, 100%);
    }

    .rpm-status-chip {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 24%, var(--rpm-line));
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--portal-text);
      font-size: 0.8rem;
      font-weight: 820;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    .rpm-status-chip svg {
      color: var(--portal-primary);
    }

    .rpm-journey-strip {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding-top: 4px;
    }

    .rpm-journey-strip span {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 18%, var(--rpm-line));
      border-radius: var(--portal-radius);
      background: color-mix(in srgb, var(--portal-primary) 5%, #fff);
      color: color-mix(in srgb, var(--portal-primary) 78%, var(--portal-text));
      font-size: 0.82rem;
      font-weight: 840;
    }

    .rpm-journey-strip span:nth-child(2) {
      color: #1d4ed8;
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .rpm-journey-strip span:nth-child(3) {
      color: #b45309;
      background: #fffbeb;
      border-color: #fde68a;
    }

    .rpm-journey-strip span:nth-child(4) {
      color: #047857;
      background: #ecfdf5;
      border-color: #bbf7d0;
    }

    .rpm-layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .rpm-rail {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 18px;
    }

    .rpm-rail-card,
    .rpm-rail-metric {
      border: 1px solid var(--rpm-line);
      background: var(--portal-surface);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.07);
    }

    .rpm-rail-card {
      padding: 18px;
      border-color: color-mix(in srgb, var(--portal-primary) 18%, var(--rpm-line));
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--portal-primary) 5%, #fff), #fff 62%);
    }

    .rpm-rail-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--portal-text);
      font-size: 0.88rem;
      font-weight: 850;
    }

    .rpm-rail-heading svg {
      color: var(--portal-primary);
    }

    .rpm-rail-card p {
      margin: 11px 0 0;
      color: var(--portal-text);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .rpm-rail-card .rpm-muted {
      color: var(--portal-text-muted);
      font-size: 0.84rem;
    }

    .rpm-rail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .rpm-rail-metric {
      min-height: 116px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 9px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .rpm-rail-metric:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.1);
    }

    .rpm-rail-metric svg {
      color: var(--portal-primary);
    }

    .rpm-rail-metric span {
      color: var(--portal-text-muted);
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .rpm-rail-metric strong {
      color: var(--portal-text);
      font-size: 0.94rem;
      line-height: 1.2;
    }

    .rpm-workbench {
      border: 1px solid var(--rpm-line);
      background: var(--portal-surface);
      box-shadow: 0 24px 54px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .rpm-tabs {
      display: flex;
      grid-template-columns: unset;
      gap: 0;
      padding: 8px;
      border-bottom: 1px solid var(--rpm-line);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--portal-primary) 5%, #fff), color-mix(in srgb, var(--portal-bg) 60%, #fff));
    }

    .rpm-tab {
      flex: 1 1 0;
      min-width: 0;
      min-height: 46px;
      border: 1px solid transparent;
      border-right: 0;
      border-radius: var(--portal-radius);
      color: var(--portal-text-muted);
      font-size: 0.88rem;
      font-weight: 760;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .rpm-tab.is-active {
      border-color: color-mix(in srgb, var(--portal-primary) 40%, transparent);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 88%, #0f172a), color-mix(in srgb, var(--portal-primary) 68%, #2563eb));
      color: #fff;
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.16);
    }

    .rpm-tab.is-active svg {
      color: #fff;
    }

    .rpm-workbench-body {
      padding: clamp(22px, 3vw, 34px);
      background:
        linear-gradient(180deg, #fff 0%, color-mix(in srgb, var(--portal-bg) 36%, #fff) 100%);
    }

    .rpm-section-head {
      align-items: center;
      padding-bottom: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--rpm-line);
    }

    .rpm-section-title {
      font-size: 1.22rem;
      font-weight: 820;
    }

    .rpm-section-copy {
      max-width: 720px;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .rpm-icon-box {
      border-radius: var(--portal-radius);
      box-shadow: none;
    }

    .rpm-form-grid {
      grid-template-columns: minmax(160px, 0.4fr) minmax(240px, 1fr) auto;
      gap: 12px;
    }

    .rpm-label {
      font-size: 0.78rem;
      font-weight: 820;
    }

    .rpm-input,
    .rpm-select,
    .rpm-textarea {
      min-height: 46px;
      border-color: var(--rpm-line);
      border-radius: var(--portal-radius);
      background: #fff;
      color: var(--portal-text);
      box-shadow: inset 0 1px 0 rgba(15, 23, 42, 0.02);
    }

    .rpm-button {
      min-height: 46px;
      border-radius: var(--portal-radius);
      font-size: 0.9rem;
      font-weight: 820;
      box-shadow: 0 10px 20px color-mix(in srgb, var(--portal-primary) 18%, transparent);
    }

    .rpm-button:hover:not(:disabled) {
      transform: none;
    }

    .rpm-button.secondary,
    .rpm-button.ghost {
      background: #fff;
      box-shadow: none;
    }

    .rpm-error,
    .rpm-success,
    .rpm-note {
      border-radius: var(--portal-radius);
      font-weight: 650;
      line-height: 1.45;
    }

    .rpm-results {
      gap: 14px;
    }

    .rpm-result-card,
    .rpm-panel {
      border: 1px solid var(--rpm-line);
      background: #fff;
    }

    .rpm-result-card {
      padding: 18px;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.06);
    }

    .rpm-card-head {
      align-items: center;
    }

    .rpm-card-title {
      font-size: 1rem;
      font-weight: 820;
    }

    .rpm-card-meta {
      color: var(--portal-text-muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .rpm-badge {
      min-height: 28px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 850;
    }

    .rpm-kv-grid {
      gap: 10px;
    }

    .rpm-single-kv {
      grid-template-columns: 1fr;
    }

    .rpm-kv {
      min-height: 68px;
      border-radius: var(--portal-radius);
      background:
        linear-gradient(180deg, #fff, color-mix(in srgb, var(--portal-bg) 46%, #fff));
    }

    .rpm-kv span {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .rpm-item-row {
      border-radius: var(--portal-radius);
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
    }

    .rpm-selectable-row {
      grid-template-columns: minmax(104px, auto) 58px minmax(0, 1fr) 92px;
    }

    .rpm-select-control,
    .rpm-thumb,
    .rpm-select-box,
    .rpm-choice-card,
    .rpm-step,
    .rpm-upload {
      border-radius: var(--portal-radius);
    }

    .rpm-select-control {
      min-height: 42px;
    }

    .rpm-thumb {
      width: 52px;
      height: 52px;
    }

    .rpm-stepper {
      position: relative;
      gap: 10px;
    }

    .rpm-step {
      background: #fff;
      font-size: 0.8rem;
    }

    .rpm-step.is-active {
      color: var(--portal-text);
      border-color: color-mix(in srgb, var(--portal-primary) 34%, var(--rpm-line));
      box-shadow: inset 3px 0 0 var(--portal-primary);
    }

    .rpm-two-col {
      grid-template-columns: minmax(0, 1fr) minmax(260px, 320px);
      gap: 16px;
    }

    .rpm-summary-panel,
    .rpm-resolution-panel {
      padding: 16px;
    }

    .rpm-resolution-body,
    .rpm-file-list {
      margin-top: 12px;
    }

    .rpm-upload {
      min-height: 118px;
      background: color-mix(in srgb, var(--portal-primary) 4%, #fff);
      text-align: left;
      place-items: center start;
    }

    .rpm-choice-card {
      min-height: 80px;
      background: #fff;
    }

    .rpm-choice-card[data-checked],
    .rpm-select-control[data-checked] {
      color: var(--portal-text);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--portal-primary) 14%, transparent);
    }

    .rpm-success-card {
      border-color: color-mix(in srgb, var(--rpm-green) 30%, var(--rpm-line));
      background: #fff;
      box-shadow: none;
    }

    .rpm-success-card::before {
      display: none;
    }

    .rpm-success-badge {
      border-radius: var(--portal-radius);
      box-shadow: none;
    }

    .rpm-skeleton-card {
      margin-top: 18px;
    }

    .rpm-empty {
      border-radius: var(--portal-radius);
      background: color-mix(in srgb, var(--portal-bg) 58%, #fff);
    }

    .rpm-toast {
      border: 1px solid var(--rpm-line);
      background: #fff;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.14);
    }

    @media (max-width: 1000px) {
      .rpm-hero,
      .rpm-layout {
        grid-template-columns: 1fr;
      }

      .rpm-rail {
        position: static;
      }

      .rpm-rail-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .rpm-shell {
        width: min(100% - 24px, 1240px);
        padding-top: 12px;
      }

      .rpm-layout {
        display: flex;
        flex-direction: column;
      }

      .rpm-workbench {
        order: 1;
      }

      .rpm-rail {
        order: 2;
      }

      .rpm-hero-main {
        grid-template-columns: 1fr;
      }

      .rpm-hero-status {
        justify-content: flex-start;
        min-width: 0;
      }

      .rpm-form-grid,
      .rpm-two-col,
      .rpm-kv-grid,
      .rpm-stepper,
      .rpm-choice-grid {
        grid-template-columns: 1fr;
      }

      .rpm-rail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .rpm-tabs {
        display: grid;
        grid-template-columns: 1fr;
      }

      .rpm-tab {
        justify-content: flex-start;
        border-bottom: 0;
      }

      .rpm-selectable-row,
      .rpm-item-row {
        grid-template-columns: 1fr;
      }

      .rpm-form-grid .rpm-button,
      .rpm-footer-actions .rpm-button {
        width: 100%;
      }
    }

    /* Returnly reference skin from Tanishq45/your-easy-path. */
    :root {
      --rpm-ref-bg: oklch(0.16 0.015 260);
      --rpm-ref-surface: oklch(0.21 0.018 260);
      --rpm-ref-card: oklch(0.22 0.02 260);
      --rpm-ref-muted: oklch(0.72 0.02 260);
      --rpm-ref-primary: oklch(0.74 0.18 47);
      --rpm-ref-warning: oklch(0.82 0.15 85);
      --rpm-ref-success: oklch(0.72 0.16 155);
      --rpm-ref-danger: oklch(0.62 0.22 25);
      --rpm-ref-border: oklch(1 0 0 / 9%);
      --rpm-ref-input: oklch(1 0 0 / 11%);
      --rpm-ref-foreground: oklch(0.98 0.005 250);
      --rpm-ref-shadow-card: 0 1px 0 0 oklch(1 0 0 / 5%) inset, 0 24px 40px -28px oklch(0 0 0 / 65%);
      --rpm-ref-shadow-glow: 0 20px 60px -20px color-mix(in oklab, var(--rpm-ref-primary) 55%, transparent);
      --portal-primary: var(--rpm-ref-primary);
      --portal-primary-hover: color-mix(in oklab, var(--rpm-ref-primary) 90%, white);
      --portal-bg: var(--rpm-ref-bg);
      --portal-surface: var(--rpm-ref-card);
      --portal-text: var(--rpm-ref-foreground);
      --portal-text-muted: var(--rpm-ref-muted);
      --portal-border: var(--rpm-ref-border);
      --portal-font: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --portal-heading-font: "Space Grotesk", "Inter", system-ui, sans-serif;
      --portal-radius: 12px;
      --rpm-line: var(--rpm-ref-border);
    }

    html {
      background: var(--rpm-ref-bg);
      color: var(--rpm-ref-foreground);
      font-family: var(--portal-font);
    }

    body {
      background:
        radial-gradient(ellipse at top, color-mix(in oklab, var(--rpm-ref-primary) 22%, transparent), transparent 58%),
        linear-gradient(180deg, var(--rpm-ref-bg), var(--rpm-ref-surface));
      background-attachment: fixed;
      color: var(--rpm-ref-foreground);
    }

    body::before {
      display: block;
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, oklch(1 0 0 / 0.045) 1px, transparent 1px),
        linear-gradient(to bottom, oklch(1 0 0 / 0.045) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 25%, transparent 76%);
    }

    .rpm-shell {
      width: min(1152px, calc(100% - 48px));
      padding: 30px 0 56px;
      gap: 22px;
    }

    .rpm-hero {
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .rpm-brand-row {
      min-height: 64px;
      padding: 0;
      border: 0;
      border-bottom: 1px solid color-mix(in oklab, white 8%, transparent);
      border-radius: 0;
      background: color-mix(in oklab, var(--rpm-ref-bg) 72%, transparent);
      box-shadow: none;
      backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rpm-brand-row::after {
      display: none;
    }

    .rpm-brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border-color: color-mix(in oklab, white 20%, transparent);
      background: linear-gradient(135deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
      color: oklch(0.18 0.02 260);
      box-shadow: var(--rpm-ref-shadow-glow);
    }

    .rpm-brand-name,
    .rpm-hero h1,
    .rpm-section-title,
    .rpm-card-title,
    .rpm-item-title,
    .rpm-kv strong,
    .rpm-rail-metric strong,
    .rpm-choice-card strong,
    .rpm-success-card .rpm-kv strong {
      font-family: var(--portal-heading-font);
      letter-spacing: -0.02em;
    }

    .rpm-brand-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--rpm-ref-foreground);
    }

    .rpm-brand-shop {
      color: var(--rpm-ref-muted);
      font-size: 0.76rem;
      font-weight: 500;
      border-left: 1px solid color-mix(in oklab, white 12%, transparent);
      padding-left: 10px;
      margin-top: 0;
    }

    .rpm-brand-row > div:last-child {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rpm-hero-main {
      padding: clamp(36px, 6vw, 80px) clamp(22px, 5vw, 64px);
      min-height: 330px;
      grid-template-columns: 1fr;
      border: 1px solid color-mix(in oklab, white 9%, transparent);
      border-radius: 24px;
      background:
        radial-gradient(ellipse at top, color-mix(in oklab, var(--rpm-ref-primary) 22%, transparent), transparent 62%),
        linear-gradient(180deg, color-mix(in oklab, var(--rpm-ref-card) 86%, transparent), color-mix(in oklab, var(--rpm-ref-surface) 96%, transparent));
      box-shadow: var(--rpm-ref-shadow-card);
      overflow: hidden;
    }

    .rpm-hero-main::before {
      display: none;
    }

    .rpm-hero-copy-block {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .rpm-hero h1 {
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(3.1rem, 7vw, 6rem);
      line-height: 1.02;
      font-weight: 700;
      color: var(--rpm-ref-foreground);
    }

    .rpm-hero h1::after {
      content: ".";
      color: transparent;
      background: linear-gradient(90deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .rpm-hero-copy {
      max-width: 580px;
      margin: 18px auto 0;
      color: var(--rpm-ref-muted);
      font-size: 1rem;
    }

    .rpm-hero-status {
      justify-content: center;
      min-width: 0;
      margin-top: 8px;
    }

    .rpm-status-chip {
      min-height: 30px;
      padding: 5px 10px;
      border-color: color-mix(in oklab, white 10%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-surface) 72%, transparent);
      color: var(--rpm-ref-muted);
      font-size: 0.74rem;
      font-weight: 500;
      box-shadow: none;
    }

    .rpm-status-chip svg {
      color: var(--rpm-ref-primary);
    }

    .rpm-journey-strip {
      max-width: 700px;
      width: 100%;
      margin: 18px auto 0;
      gap: 12px;
    }

    .rpm-journey-strip span,
    .rpm-journey-strip span:nth-child(2),
    .rpm-journey-strip span:nth-child(3),
    .rpm-journey-strip span:nth-child(4) {
      min-height: 46px;
      border-color: color-mix(in oklab, white 10%, transparent);
      border-radius: 12px;
      background: color-mix(in oklab, var(--rpm-ref-surface) 76%, transparent);
      color: var(--rpm-ref-muted);
      box-shadow: none;
      transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
    }

    .rpm-journey-strip span:first-child,
    .rpm-journey-strip span:hover {
      border-color: color-mix(in oklab, var(--rpm-ref-primary) 48%, transparent);
      color: var(--rpm-ref-primary);
      background: color-mix(in oklab, var(--rpm-ref-primary) 14%, var(--rpm-ref-surface));
    }

    .rpm-layout {
      grid-template-columns: minmax(260px, 0.34fr) minmax(0, 1fr);
      gap: 18px;
    }

    .rpm-rail {
      gap: 14px;
    }

    .rpm-rail-card,
    .rpm-rail-metric,
    .rpm-workbench,
    .rpm-result-card,
    .rpm-panel,
    .rpm-empty,
    .rpm-success-card {
      border: 1px solid color-mix(in oklab, white 9%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-card) 84%, transparent);
      box-shadow: var(--rpm-ref-shadow-card);
      backdrop-filter: blur(18px);
    }

    .rpm-rail-card {
      padding: 20px;
      border-radius: 20px;
    }

    .rpm-rail-heading {
      color: var(--rpm-ref-foreground);
      font-weight: 700;
    }

    .rpm-rail-heading svg,
    .rpm-rail-metric svg {
      color: var(--rpm-ref-primary);
    }

    .rpm-rail-card p {
      color: var(--rpm-ref-foreground);
    }

    .rpm-rail-card .rpm-muted,
    .rpm-card-meta,
    .rpm-item-meta,
    .rpm-section-copy,
    .rpm-kv span,
    .rpm-loading-note,
    .rpm-choice-card small {
      color: var(--rpm-ref-muted);
    }

    .rpm-rail-metric {
      min-height: 118px;
      border-radius: 16px;
      background: color-mix(in oklab, var(--rpm-ref-card) 70%, transparent);
    }

    .rpm-rail-metric span,
    .rpm-kv span {
      color: var(--rpm-ref-muted);
      letter-spacing: 0.08em;
    }

    .rpm-rail-metric:hover {
      border-color: color-mix(in oklab, var(--rpm-ref-primary) 38%, transparent);
      box-shadow: var(--rpm-ref-shadow-glow);
    }

    .rpm-workbench {
      border-radius: 24px;
      overflow: hidden;
    }

    .rpm-tabs {
      padding: 8px;
      gap: 4px;
      border-bottom-color: color-mix(in oklab, white 8%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-bg) 52%, transparent);
    }

    .rpm-tab {
      min-height: 46px;
      border-radius: 12px;
      color: var(--rpm-ref-muted);
      font-weight: 600;
    }

    .rpm-tab:hover {
      color: var(--rpm-ref-foreground);
      background: color-mix(in oklab, var(--rpm-ref-surface) 62%, transparent);
    }

    .rpm-tab.is-active {
      border-color: color-mix(in oklab, var(--rpm-ref-primary) 40%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-surface) 92%, transparent);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-tab.is-active svg {
      color: var(--rpm-ref-primary);
    }

    .rpm-workbench-body {
      padding: clamp(22px, 4vw, 34px);
      background: transparent;
    }

    .rpm-section-head {
      border-bottom-color: color-mix(in oklab, white 8%, transparent);
    }

    .rpm-section-title {
      color: var(--rpm-ref-foreground);
      font-size: 1.45rem;
      font-weight: 700;
    }

    .rpm-icon-box {
      border-color: color-mix(in oklab, white 10%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-surface) 72%, transparent);
      color: var(--rpm-ref-primary);
    }

    .rpm-label {
      color: var(--rpm-ref-foreground);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .rpm-input,
    .rpm-select,
    .rpm-textarea {
      min-height: 48px;
      border-color: var(--rpm-ref-input);
      border-radius: 12px;
      background: color-mix(in oklab, var(--rpm-ref-bg) 60%, transparent);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-input::placeholder,
    .rpm-textarea::placeholder {
      color: color-mix(in oklab, var(--rpm-ref-muted) 70%, transparent);
    }

    .rpm-input:focus,
    .rpm-select:focus,
    .rpm-textarea:focus {
      border-color: transparent;
      box-shadow: 0 0 0 2px var(--rpm-ref-primary);
    }

    .rpm-button {
      min-height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
      color: oklch(0.18 0.02 260);
      font-weight: 700;
      box-shadow: var(--rpm-ref-shadow-glow);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .rpm-button:hover:not(:disabled) {
      opacity: 0.92;
      transform: scale(1.015);
      background: linear-gradient(135deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
    }

    .rpm-button.secondary,
    .rpm-button.ghost {
      border-color: color-mix(in oklab, white 10%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-surface) 76%, transparent);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-button.secondary:hover:not(:disabled),
    .rpm-button.ghost:hover:not(:disabled) {
      background: color-mix(in oklab, white 7%, var(--rpm-ref-surface));
    }

    .rpm-button.danger {
      background: color-mix(in oklab, var(--rpm-ref-danger) 88%, black);
      color: var(--rpm-ref-foreground);
    }

    .rpm-result-card,
    .rpm-panel {
      border-radius: 20px;
      padding: 20px;
    }

    .rpm-card-title,
    .rpm-item-title,
    .rpm-kv strong,
    .rpm-rail-metric strong {
      color: var(--rpm-ref-foreground);
    }

    .rpm-kv {
      border-color: color-mix(in oklab, white 8%, transparent);
      border-radius: 12px;
      background: color-mix(in oklab, var(--rpm-ref-surface) 68%, transparent);
    }

    .rpm-item-row,
    .rpm-select-control,
    .rpm-choice-card,
    .rpm-upload,
    .rpm-step,
    .rpm-empty {
      border-color: color-mix(in oklab, white 8%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-surface) 70%, transparent);
      color: var(--rpm-ref-foreground);
      box-shadow: none;
    }

    .rpm-select-control[data-checked],
    .rpm-choice-card[data-checked],
    .rpm-step.is-active {
      border-color: color-mix(in oklab, var(--rpm-ref-primary) 45%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-primary) 15%, var(--rpm-ref-surface));
      color: var(--rpm-ref-primary);
      box-shadow: none;
    }

    .rpm-thumb {
      border-color: color-mix(in oklab, white 9%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-bg) 74%, transparent);
    }

    .rpm-badge {
      border-color: color-mix(in oklab, white 10%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-surface) 70%, transparent);
      color: var(--rpm-ref-muted);
    }

    .rpm-badge.ok,
    .rpm-success {
      border-color: color-mix(in oklab, var(--rpm-ref-success) 34%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-success) 16%, transparent);
      color: var(--rpm-ref-success);
    }

    .rpm-badge.info,
    .rpm-note {
      border-color: color-mix(in oklab, var(--rpm-ref-primary) 34%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-primary) 14%, transparent);
      color: var(--rpm-ref-primary);
    }

    .rpm-badge.warn {
      border-color: color-mix(in oklab, var(--rpm-ref-warning) 34%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-warning) 14%, transparent);
      color: var(--rpm-ref-warning);
    }

    .rpm-badge.danger,
    .rpm-error {
      border-color: color-mix(in oklab, var(--rpm-ref-danger) 34%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-danger) 14%, transparent);
      color: var(--rpm-ref-danger);
    }

    .rpm-upload {
      background: color-mix(in oklab, var(--rpm-ref-primary) 9%, var(--rpm-ref-surface));
    }

    .rpm-upload em {
      background: color-mix(in oklab, var(--rpm-ref-danger) 18%, transparent);
      color: var(--rpm-ref-danger);
    }

    .rpm-skeleton-line {
      background: linear-gradient(90deg, color-mix(in oklab, white 7%, transparent), color-mix(in oklab, white 16%, transparent), color-mix(in oklab, white 7%, transparent));
      background-size: 200% 100%;
    }

    .rpm-toast {
      border-color: color-mix(in oklab, white 10%, transparent);
      background: color-mix(in oklab, var(--rpm-ref-card) 94%, transparent);
      color: var(--rpm-ref-foreground);
      box-shadow: var(--rpm-ref-shadow-card);
      backdrop-filter: blur(18px);
    }

    @media (max-width: 900px) {
      .rpm-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .rpm-shell {
        width: min(100% - 24px, 1152px);
        padding-top: 12px;
      }

      .rpm-brand-row {
        min-height: 58px;
      }

      .rpm-brand-shop {
        display: none;
      }

      .rpm-hero-main {
        min-height: auto;
        padding: 32px 20px 22px;
        border-radius: 18px;
      }

      .rpm-hero h1 {
        font-size: clamp(2.45rem, 13vw, 3.6rem);
      }

      .rpm-hero-copy {
        font-size: 0.95rem;
      }

      .rpm-hero-status {
        justify-content: center;
      }

      .rpm-journey-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .rpm-workbench,
      .rpm-rail-card,
      .rpm-rail-metric,
      .rpm-result-card,
      .rpm-panel {
        border-radius: 18px;
      }

      .rpm-tabs {
        grid-template-columns: 1fr;
      }
    }

    /* Light checkered Returnly-style skin. Keep this last so it wins over older theme experiments. */
    :root {
      --portal-primary: %PRIMARY_COLOR%;
      --portal-primary-hover: %PRIMARY_HOVER%;
      --portal-bg: %BG_COLOR%;
      --portal-surface: %SURFACE_COLOR%;
      --portal-text: %TEXT_COLOR%;
      --portal-text-muted: %TEXT_MUTED%;
      --portal-border: %BORDER_COLOR%;
      --portal-font: %FONT_FAMILY%;
      --portal-heading-font: %HEADING_FONT%;
      --portal-shadow: %SHADOW%;
      --portal-primary-contrast: %PRIMARY_CONTRAST%;
      --portal-primary-soft: color-mix(in srgb, var(--portal-primary) 9%, var(--portal-surface));
      --portal-primary-tint: color-mix(in srgb, var(--portal-primary) 15%, transparent);
      --portal-primary-accent: color-mix(in srgb, var(--portal-primary) 62%, #f4b84f);
      --portal-primary-shadow: color-mix(in srgb, var(--portal-primary) 55%, transparent);
      --rpm-ref-bg: color-mix(in srgb, var(--portal-bg) 76%, #ffffff);
      --rpm-ref-surface: color-mix(in srgb, var(--portal-surface) 92%, #ffffff);
      --rpm-ref-card: color-mix(in srgb, var(--portal-surface) 94%, #ffffff);
      --rpm-ref-muted: var(--portal-text-muted);
      --rpm-ref-primary: var(--portal-primary);
      --rpm-ref-warning: var(--portal-primary-accent);
      --rpm-ref-success: #138a5b;
      --rpm-ref-danger: #c24135;
      --rpm-ref-border: rgba(27, 36, 48, 0.1);
      --rpm-ref-input: rgba(27, 36, 48, 0.14);
      --rpm-ref-foreground: var(--portal-text);
      --rpm-ref-on-primary: var(--portal-primary-contrast);
      --rpm-ref-primary-soft: var(--portal-primary-soft);
      --rpm-ref-primary-tint: var(--portal-primary-tint);
      --rpm-ref-shadow-card: 0 1px 0 rgba(255, 255, 255, 0.9) inset, 0 22px 44px -32px rgba(27, 36, 48, 0.34);
      --rpm-ref-shadow-glow: 0 18px 38px -24px var(--portal-primary-shadow);
      --portal-radius: min(12px, 8px);
      --rpm-line: var(--rpm-ref-border);
    }

    html {
      background: var(--rpm-ref-bg);
      color: var(--rpm-ref-foreground);
    }

    body {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(248, 250, 247, 0.72) 360px),
        var(--rpm-ref-bg);
      color: var(--rpm-ref-foreground);
    }

    body::before {
      display: block;
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        conic-gradient(from 90deg at 1px 1px,
          rgba(23, 32, 46, 0.055) 25%,
          rgba(255, 255, 255, 0.72) 0 50%,
          rgba(23, 32, 46, 0.055) 0 75%,
          rgba(255, 255, 255, 0.72) 0);
      background-size: 34px 34px;
      opacity: 0.58;
      mask-image: linear-gradient(180deg, #000 0%, #000 72%, transparent 100%);
    }

    .rpm-shell {
      width: min(1080px, calc(100% - 48px));
      padding: 14px 0 42px;
      gap: 12px;
      min-width: 0;
    }

    .rpm-shell > :not(.rpm-floating-layer) {
      position: relative;
      z-index: 1;
    }

    .rpm-floating-layer {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .rpm-float-mark {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid color-mix(in srgb, var(--rpm-ref-primary) 20%, transparent);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      color: color-mix(in srgb, var(--rpm-ref-primary) 72%, transparent);
      box-shadow: 0 18px 34px -28px rgba(27, 36, 48, 0.5);
      opacity: 0.62;
      backdrop-filter: blur(10px);
      animation: rpm-float 8s ease-in-out infinite;
    }

    .rpm-float-one {
      top: 17%;
      left: max(18px, 5vw);
    }

    .rpm-float-two {
      top: 12%;
      right: max(18px, 7vw);
      animation-delay: -2s;
    }

    .rpm-float-three {
      top: 44%;
      left: max(14px, 3vw);
      animation-delay: -4s;
    }

    .rpm-float-four {
      top: 48%;
      right: max(14px, 4vw);
      animation-delay: -1s;
    }

    .rpm-float-five {
      top: 72%;
      left: max(18px, 11vw);
      animation-delay: -3s;
    }

    .rpm-float-six {
      top: 76%;
      right: max(18px, 12vw);
      animation-delay: -5s;
    }

    .rpm-boot-fallback,
    .rpm-nojs {
      width: min(1152px, calc(100% - 48px));
      margin: 0 auto;
      padding: 28px 0 54px;
    }

    .rpm-boot-fallback .rpm-hero-main,
    .rpm-nojs {
      margin-top: 16px;
    }

    .rpm-nojs {
      border: 1px solid rgba(27, 36, 48, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--rpm-ref-shadow-card);
    }

    .rpm-nojs h1,
    .rpm-nojs p {
      max-width: 620px;
      margin-right: auto;
      margin-left: auto;
      text-align: center;
    }

    .rpm-nojs h1 {
      margin-top: 0;
      font-family: var(--portal-heading-font);
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.05;
    }

    .rpm-nojs p {
      margin-bottom: 0;
      color: var(--rpm-ref-muted);
    }

    .rpm-hero {
      grid-template-columns: 1fr;
      gap: 16px;
      min-width: 0;
      order: 0;
    }

    .rpm-brand-row {
      min-height: 48px;
      padding: 0 2px 8px;
      border: 0;
      border-bottom: 1px solid rgba(27, 36, 48, 0.1);
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: var(--rpm-ref-foreground);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rpm-brand-row::after {
      display: none;
    }

    .rpm-brand-mark {
      width: 32px;
      height: 32px;
      border-radius: var(--portal-radius);
      border-color: rgba(27, 36, 48, 0.1);
      background: linear-gradient(135deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
      color: #17202e;
      box-shadow: var(--rpm-ref-shadow-glow);
    }

    .rpm-brand-name,
    .rpm-hero h1,
    .rpm-section-title,
    .rpm-card-title,
    .rpm-item-title,
    .rpm-kv strong,
    .rpm-rail-metric strong,
    .rpm-choice-card strong,
    .rpm-success-card .rpm-kv strong {
      font-family: var(--portal-heading-font);
      letter-spacing: 0;
    }

    .rpm-brand-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--rpm-ref-foreground);
    }

    .rpm-brand-shop {
      color: var(--rpm-ref-muted);
      font-size: 0.78rem;
      font-weight: 500;
      border-left: 1px solid rgba(27, 36, 48, 0.12);
      padding-left: 10px;
      margin-top: 0;
    }

    .rpm-brand-row > div:last-child {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rpm-hero-main {
      min-height: 120px;
      padding: clamp(14px, 2vw, 20px) clamp(18px, 3vw, 30px);
      grid-template-columns: 1fr;
      min-width: 0;
      border: 1px solid rgba(27, 36, 48, 0.1);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 253, 248, 0.9)),
        linear-gradient(90deg, color-mix(in srgb, var(--rpm-ref-primary) 8%, transparent) 1px, transparent 1px),
        linear-gradient(0deg, color-mix(in srgb, var(--rpm-ref-primary) 8%, transparent) 1px, transparent 1px);
      background-size: auto, 42px 42px, 42px 42px;
      box-shadow: var(--rpm-ref-shadow-card);
      overflow: hidden;
    }

    .rpm-hero-main::before {
      display: none;
    }

    .rpm-hero-copy-block {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .rpm-hero h1 {
      max-width: min(900px, 100%);
      margin: 0 auto;
      font-size: clamp(1.7rem, 2.6vw, 2.45rem);
      line-height: 1.04;
      font-weight: 700;
      color: var(--rpm-ref-foreground);
      overflow-wrap: break-word;
    }

    .rpm-hero h1::after {
      content: ".";
      color: var(--rpm-ref-primary);
    }

    .rpm-hero-copy {
      max-width: 600px;
      margin: 6px auto 0;
      color: var(--rpm-ref-muted);
      font-size: 0.88rem;
    }

    .rpm-hero-status {
      justify-content: center;
      min-width: 0;
      margin-top: 6px;
    }

    .rpm-status-chip {
      min-height: 26px;
      padding: 3px 8px;
      border-color: rgba(27, 36, 48, 0.1);
      background: rgba(255, 255, 255, 0.76);
      color: var(--rpm-ref-muted);
      font-size: 0.74rem;
      font-weight: 600;
      box-shadow: none;
    }

    .rpm-status-chip svg {
      color: var(--rpm-ref-primary);
    }

    .rpm-journey-strip {
      max-width: 520px;
      width: 100%;
      margin: 8px auto 0;
      gap: 8px;
    }

    .rpm-journey-strip span,
    .rpm-journey-strip span:nth-child(2),
    .rpm-journey-strip span:nth-child(3),
    .rpm-journey-strip span:nth-child(4) {
      min-height: 34px;
      padding: 7px 10px;
      border-color: rgba(27, 36, 48, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--rpm-ref-muted);
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: none;
      transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
    }

    .rpm-journey-strip span:first-child,
    .rpm-journey-strip span:hover {
      border-color: color-mix(in srgb, var(--rpm-ref-primary) 44%, transparent);
      color: var(--rpm-ref-primary);
      background: color-mix(in srgb, var(--rpm-ref-primary) 12%, #ffffff);
    }

    .rpm-delivery-motion {
      --rpm-delivery-drive: 420px;
      position: relative;
      width: min(520px, 100%);
      height: 54px;
      margin: 10px auto 0;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--rpm-ref-primary) 18%, transparent);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.52)),
        color-mix(in srgb, var(--rpm-ref-primary) 5%, transparent);
      box-shadow: 0 16px 34px -30px rgba(27, 36, 48, 0.48);
    }

    .rpm-delivery-road {
      position: absolute;
      right: 20px;
      left: 20px;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: linear-gradient(90deg,
          transparent,
          color-mix(in srgb, var(--rpm-ref-primary) 30%, transparent),
          transparent);
    }

    .rpm-delivery-road::after {
      content: "";
      position: absolute;
      right: 0;
      left: 0;
      top: -8px;
      height: 1px;
      background-image: linear-gradient(90deg,
          color-mix(in srgb, var(--rpm-ref-primary) 36%, transparent) 0 8px,
          transparent 8px 18px);
      background-size: 18px 1px;
      animation: rpm-road-markers 0.9s linear infinite;
    }

    .rpm-delivery-node,
    .rpm-delivery-van {
      position: absolute;
      top: 50%;
      display: grid;
      place-items: center;
      border-radius: 8px;
    }

    .rpm-delivery-node {
      z-index: 1;
      width: 30px;
      height: 30px;
      border: 1px solid color-mix(in srgb, var(--rpm-ref-primary) 26%, rgba(255, 255, 255, 0.74));
      background: rgba(255, 255, 255, 0.82);
      color: var(--rpm-ref-primary);
      transform: translateY(-50%);
      animation: rpm-delivery-node-pulse 2.6s ease-in-out infinite;
    }

    .rpm-delivery-node-start {
      left: 20px;
    }

    .rpm-delivery-node-end {
      right: 20px;
      animation-delay: 1.1s;
    }

    .rpm-delivery-van {
      z-index: 2;
      left: 48px;
      width: 42px;
      height: 30px;
      color: var(--rpm-ref-on-primary);
      background: linear-gradient(135deg, var(--rpm-ref-primary), var(--rpm-ref-warning));
      box-shadow: var(--rpm-ref-shadow-glow);
      transform: translate3d(0, -50%, 0);
      animation: rpm-delivery-drive 4.8s cubic-bezier(0.42, 0, 0.2, 1) infinite;
      will-change: transform, opacity;
    }

    .rpm-delivery-van::after {
      content: "";
      position: absolute;
      right: 7px;
      bottom: -3px;
      width: 26px;
      height: 5px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 4px 50%, var(--rpm-ref-foreground) 0 2px, transparent 2.5px),
        radial-gradient(circle at 22px 50%, var(--rpm-ref-foreground) 0 2px, transparent 2.5px);
      opacity: 0.42;
    }

    .rpm-delivery-parcel {
      position: absolute;
      top: 15px;
      width: 8px;
      height: 8px;
      border: 1px solid color-mix(in srgb, var(--rpm-ref-primary) 30%, transparent);
      border-radius: 3px;
      background: color-mix(in srgb, var(--rpm-ref-warning) 22%, #ffffff);
      opacity: 0.74;
      transform: translate3d(0, 0, 0) rotate(8deg);
      animation: rpm-parcel-float 3.4s ease-in-out infinite;
    }

    .rpm-delivery-parcel-one {
      left: 28%;
    }

    .rpm-delivery-parcel-two {
      left: 52%;
      top: 34px;
      animation-delay: 0.7s;
    }

    .rpm-delivery-parcel-three {
      left: 72%;
      animation-delay: 1.3s;
    }

    .rpm-commerce-token {
      position: absolute;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid color-mix(in srgb, var(--rpm-ref-primary) 18%, rgba(255, 255, 255, 0.8));
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--rpm-ref-primary);
      opacity: 0.76;
      box-shadow: 0 10px 20px -18px rgba(27, 36, 48, 0.5);
      transform: translate3d(0, 0, 0) rotate(0deg);
      animation: rpm-commerce-drift 3.8s ease-in-out infinite;
    }

    .rpm-commerce-cart {
      left: 16%;
      top: 7px;
    }

    .rpm-commerce-bag {
      left: 38%;
      bottom: 6px;
      color: var(--rpm-ref-warning);
      animation-delay: 0.55s;
    }

    .rpm-commerce-card {
      right: 33%;
      top: 7px;
      animation-delay: 1.05s;
    }

    .rpm-commerce-receipt {
      right: 14%;
      bottom: 6px;
      color: var(--rpm-ref-warning);
      animation-delay: 1.55s;
    }

    @keyframes rpm-delivery-drive {
      0% {
        opacity: 0;
        transform: translate3d(0, -50%, 0) scale(0.96);
      }

      10%,
      78% {
        opacity: 1;
      }

      45% {
        transform: translate3d(calc(var(--rpm-delivery-drive) * 0.52), -50%, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate3d(var(--rpm-delivery-drive), -50%, 0) scale(0.96);
      }
    }

    @keyframes rpm-road-markers {
      to {
        transform: translate3d(-18px, 0, 0);
      }
    }

    @keyframes rpm-delivery-node-pulse {
      0%,
      100% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--rpm-ref-primary) 18%, transparent);
      }

      50% {
        box-shadow: 0 0 0 7px transparent;
      }
    }

    @keyframes rpm-parcel-float {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(8deg);
      }

      50% {
        transform: translate3d(0, -4px, 0) rotate(-5deg);
      }
    }

    @keyframes rpm-commerce-drift {
      0%,
      100% {
        opacity: 0.64;
        transform: translate3d(0, 0, 0) rotate(-2deg) scale(0.96);
      }

      45% {
        opacity: 0.9;
        transform: translate3d(0, -5px, 0) rotate(3deg) scale(1);
      }

      70% {
        opacity: 0.78;
        transform: translate3d(0, -2px, 0) rotate(0deg) scale(0.98);
      }
    }

    .rpm-layout {
      display: block;
      min-width: 0;
    }

    .rpm-rail {
      display: grid;
      grid-template-columns: minmax(260px, 0.82fr) minmax(0, 1.18fr);
      align-items: stretch;
      gap: 12px;
      position: relative;
      top: auto;
      order: 1;
    }

    .rpm-rail-card,
    .rpm-rail-metric,
    .rpm-workbench,
    .rpm-result-card,
    .rpm-panel,
    .rpm-empty,
    .rpm-success-card {
      border: 1px solid rgba(27, 36, 48, 0.1);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--rpm-ref-shadow-card);
      backdrop-filter: blur(14px);
    }

    .rpm-rail-card,
    .rpm-result-card,
    .rpm-panel,
    .rpm-empty,
    .rpm-success-card {
      border-radius: 8px;
    }

    .rpm-rail-card {
      min-height: 92px;
      padding: 16px;
      display: grid;
      align-content: center;
    }

    .rpm-rail-heading {
      color: var(--rpm-ref-foreground);
      font-weight: 700;
    }

    .rpm-rail-heading svg,
    .rpm-rail-metric svg {
      color: var(--rpm-ref-primary);
    }

    .rpm-rail-card p {
      margin: 8px 0 0;
      color: var(--rpm-ref-foreground);
      font-size: 0.9rem;
    }

    .rpm-rail-card .rpm-muted,
    .rpm-card-meta,
    .rpm-item-meta,
    .rpm-section-copy,
    .rpm-kv span,
    .rpm-loading-note,
    .rpm-choice-card small {
      color: var(--rpm-ref-muted);
    }

    .rpm-rail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .rpm-rail-metric {
      min-height: 92px;
