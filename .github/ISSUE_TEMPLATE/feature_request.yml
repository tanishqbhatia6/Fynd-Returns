name: Feature request
description: Suggest a new capability or improvement
title: "[Feature] <short description>"
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user or merchant pain — not the solution yet.
      placeholder: |
        Our ops team spends 30 minutes every morning triaging pending returns
        because the list doesn't show time-in-queue on each row.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
      placeholder: |
        Add a "Time in queue" column to the Returns list, showing the time
        between submission and now for pending returns. Sort by it by default.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Customer portal
        - Admin dashboard
        - Returns management
        - Refunds / exchanges / store credit
        - Fynd integration
        - Automation / rules
        - REST API / webhooks
        - Notifications
        - Reporting / analytics
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
