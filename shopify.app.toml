# Fynd Returns — Returns management for Shopify
name = "Fynd Returns"
client_id = "1d23d95fee9d678ba4de14108283414e"
application_url = "https://fynd-returns-b9ef13cc.serverless.boltic.app"
embedded = true

[access_scopes]
# write_draft_orders is required for the Exchange flow which calls the draftOrderCreate
# mutation when an admin processes an exchange (see api.returns.$id.actions.ts process_exchange).
# Without it Shopify returns: "Access denied for draftOrderCreate field. Required access:
# 'write_draft_orders' access scope or 'write_quick_sale' access scope."
scopes = "read_orders,write_orders,read_products,read_customers,read_fulfillments,write_fulfillments,write_returns,read_locations,read_draft_orders,write_draft_orders"

[auth]
redirect_urls = [
  "https://fynd-returns-b9ef13cc.serverless.boltic.app/auth/callback",
  "https://fynd-returns-b9ef13cc.serverless.boltic.app/auth/shopify/callback"
]

[webhooks]
api_version = "2026-01"

# GDPR mandatory compliance webhooks
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "/webhooks"

[[webhooks.subscriptions]]
uri = "/webhooks/app/uninstalled"
topics = ["app/uninstalled"]

[[webhooks.subscriptions]]
uri = "/webhooks/app/scopes_update"
topics = ["app/scopes_update"]

[[webhooks.subscriptions]]
uri = "/webhooks/orders/create"
topics = ["orders/create"]

[[webhooks.subscriptions]]
uri = "/webhooks/orders/updated"
topics = ["orders/updated"]

[[webhooks.subscriptions]]
uri = "/webhooks/orders/fulfilled"
topics = ["orders/fulfilled"]

[[webhooks.subscriptions]]
uri = "/webhooks/draft-orders/create"
topics = ["draft_orders/create"]

[[webhooks.subscriptions]]
uri = "/webhooks/draft-orders/update"
topics = ["draft_orders/update"]

# Shopify Managed Pricing — subscription state updates.
# Fires on install / activation / cancellation / freeze. We refetch the
# live snapshot in the handler so our ShopSettings cache stays in sync
# with Shopify's source of truth.
[[webhooks.subscriptions]]
uri = "/webhooks/app-subscriptions/update"
topics = ["app_subscriptions/update"]

[app_proxy]
url = "https://fynd-returns-b9ef13cc.serverless.boltic.app/apps/returns"
subpath = "returns"
prefix = "apps"

# Theme app extensions live under /extensions. Each subdirectory
# declares its own shopify.extension.toml. The Shopify CLI picks up
# everything in this path on `shopify app deploy`.
[extensions]
path = "extensions"
