<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Return | Return Pro Max</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 480px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .sub { color: #6d7175; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    select, input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #c9cccf; border-radius: 8px; font-size: 1rem; }
    button { width: 100%; padding: 12px; background: #008060; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .error { color: #d72c0d; font-size: 0.9rem; margin-top: 8px; }
    .step { display: none; }
    .step.active { display: block; }
    .return-item { padding: 12px; border: 1px solid #e1e3e5; border-radius: 8px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Track Your Return</h1>
  <p class="sub">Enter your order or return details</p>
  <div id="step1" class="step active">
    <label>Shop</label>
    <input type="text" id="shop" value="%SHOP%" placeholder="your-store.myshopify.com">
    <label>Lookup by</label>
    <select id="lookupType">
      <option value="order_no">Order Number</option>
      <option value="return_no">Return Number</option>
      <option value="forward_awb">Forward AWB</option>
      <option value="return_awb">Return AWB</option>
      <option value="email">Email</option>
      <option value="mobile">Mobile</option>
    </select>
    <label>Value</label>
    <input type="text" id="lookupValue" placeholder="Enter order #, AWB, email...">
    <button id="btnLookup">Look Up</button>
    <p id="err1" class="error"></p>
  </div>
  <div id="step2" class="step">
    <p>Enter the 6-digit verification code:</p>
    <input type="text" id="otp" placeholder="000000" maxlength="6">
    <button id="btnVerify">Verify</button>
    <p id="err2" class="error"></p>
  </div>
  <div id="step3" class="step">
    <h2>Your Returns</h2>
    <div id="result"></div>
  </div>
  <script>
    const APP_URL = '%APP_URL%' || window.location.origin;
    const API = APP_URL + '/api/portal';
    let sessionId = null, portalToken = null;
    document.getElementById('btnLookup').onclick = async () => {
      const shop = document.getElementById('shop').value.trim();
      const lookupType = document.getElementById('lookupType').value;
      const lookupValue = document.getElementById('lookupValue').value.trim();
      const err = document.getElementById('err1');
      err.textContent = '';
      if (!shop || !lookupValue) { err.textContent = 'Please fill in shop and value'; return; }
      try {
        const res = await fetch(API + '/lookup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ shop, lookupType, lookupValue }) });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        sessionId = data.sessionId;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        await fetch(API + '/otp/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId }) });
      } catch (e) { err.textContent = e.message; }
    };
    document.getElementById('btnVerify').onclick = async () => {
      const otp = document.getElementById('otp').value.trim();
      const err = document.getElementById('err2');
      err.textContent = '';
      try {
        const res = await fetch(API + '/otp/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId, otp }) });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        portalToken = data.portalToken;
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.add('active');
        const r = await fetch(API + '/returns', { headers: { 'Authorization': 'Bearer ' + portalToken } });
        const d = await r.json();
        document.getElementById('result').innerHTML = (d.returns || []).length === 0 ? '<p>No returns found.</p>' : d.returns.map(x => '<div class="return-item"><strong>' + (x.shopifyOrderName || x.id) + '</strong><br>Status: ' + x.status + '</div>').join('');
      } catch (e) { err.textContent = e.message; }
    };
  </script>
</body>
</html>
