# Fynd Returns — Enterprise Returns Management for Shopify
name = "Fynd Returns"
client_id = "YOUR_CLIENT_ID"
application_url = "https://YOUR_APP_URL"
embedded = true

[access_scopes]
scopes = "read_orders,write_orders,read_products,read_customers,read_fulfillments,write_fulfillments,write_returns,read_locations"

[auth]
redirect_urls = [
  "https://YOUR_APP_URL/auth/callback",
  "https://YOUR_APP_URL/auth/shopify/callback"
]

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
uri = "/webhooks/app/uninstalled"
topics = ["app/uninstalled"]

[[webhooks.subscriptions]]
uri = "/webhooks/app/scopes_update"
topics = ["app/scopes_update"]

[[webhooks.subscriptions]]
uri = "/webhooks/orders/create"
topics = ["orders/create"]

[[webhooks.subscriptions]]
uri = "/webhooks/draft-orders/create"
topics = ["draft_orders/create"]

[[webhooks.subscriptions]]
uri = "/webhooks/draft-orders/update"
topics = ["draft_orders/update"]

[app_proxy]
url = "https://YOUR_APP_URL/apps/returns"
subpath = "returns"
subpath_prefix = "apps"
