# ============================================================================
# Boltic Configuration File - fynd-returns
# ============================================================================
#
# This file is synced with the Boltic UI. Changes here affect the deployed app.
#

app: fynd-returns
build:
  builtin: dockerfile
  ignorefile: .dockerignore
language: nodejs/24
region: asia-south1

serverlessConfig:
  serverlessId: "e33b3abb-8cdc-4eb8-ae0b-ad5dca9c40be"
  Name: "Fynd-Returns"
  Runtime: "git"
  Env: {}
  PortMap:
    - Name: "http"
      Port: 8080
      Protocol: "http"
  Scaling:
    AutoStop: false
    Min: 1
    Max: 1
    MaxIdleTime: 300
  Resources:
    CPU: 0.5
    MemoryMB: 512
    MemoryMaxMB: 512
  Timeout: 120
