<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returns Portal</title>
  <!-- %FAVICON% -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --portal-primary: %PRIMARY_COLOR%;
      --portal-primary-hover: %PRIMARY_HOVER%;
      --portal-bg: %BG_COLOR%;
      --portal-surface: %SURFACE_COLOR%;
      --portal-text: %TEXT_COLOR%;
      --portal-text-muted: %TEXT_MUTED%;
      --portal-border: %BORDER_COLOR%;
      --portal-font: %FONT_FAMILY%;
      --portal-heading-font: %HEADING_FONT%;
      --portal-radius: min(%BORDER_RADIUS%, 8px);
      --portal-shadow: %SHADOW%;
      --rpm-green: #047857;
      --rpm-green-bg: #ecfdf5;
      --rpm-blue: #1d4ed8;
      --rpm-blue-bg: #eff6ff;
      --rpm-amber: #b45309;
      --rpm-amber-bg: #fffbeb;
      --rpm-red: #b91c1c;
      --rpm-red-bg: #fef2f2;
      --rpm-ink: #111827;
      --rpm-line: color-mix(in srgb, var(--portal-border) 82%, #cbd5e1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--portal-bg);
      color: var(--portal-text);
      font-family: var(--portal-font, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--portal-bg) 90%, #f8fafc) 0%, var(--portal-bg) 52%),
        var(--portal-bg);
      color: var(--portal-text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    a {
      color: inherit;
    }

    .rpm-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .rpm-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .rpm-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .rpm-brand-mark,
    .rpm-icon-box {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
      color: var(--portal-primary);
    }

    .rpm-brand-logo {
      max-width: 128px;
      max-height: 38px;
      object-fit: contain;
      display: block;
    }

    .rpm-brand-text {
      min-width: 0;
    }

    .rpm-brand-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--portal-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rpm-brand-subtitle {
      margin: 1px 0 0;
      font-size: 0.78rem;
      color: var(--portal-text-muted);
    }

    .rpm-locale {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-surface) 86%, transparent);
      color: var(--portal-text-muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .rpm-hero {
      display: block;
      margin-bottom: 18px;
    }

    .rpm-hero-main,
    .rpm-panel,
    .rpm-result-card,
    .rpm-toast {
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-surface) 94%, transparent);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.07);
    }

    .rpm-hero-main {
      padding: clamp(18px, 3vw, 28px);
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.54fr);
      gap: 18px;
      align-items: end;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--portal-primary) 4%, var(--portal-surface)) 0%, var(--portal-surface) 70%),
        var(--portal-surface);
    }

    .rpm-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 9px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 26%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
      color: var(--portal-primary);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .rpm-hero h1 {
      margin: 0;
      max-width: 660px;
      font-family: var(--portal-heading-font, Inter, system-ui, sans-serif);
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--portal-text);
    }

    .rpm-hero-copy {
      margin: 14px 0 0;
      max-width: 620px;
      color: var(--portal-text-muted);
      font-size: 0.98rem;
    }

    .rpm-policy {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--portal-primary) 20%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 5%, var(--portal-surface));
      color: var(--portal-text-muted);
      font-size: 0.9rem;
    }

    .rpm-workbench {
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-surface) 92%, transparent);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .rpm-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      border-bottom: 1px solid var(--rpm-line);
      background: color-mix(in srgb, var(--portal-bg) 70%, var(--portal-surface));
    }

    .rpm-tab {
      min-height: 54px;
      border: 0;
      border-right: 1px solid var(--rpm-line);
      background: transparent;
      color: var(--portal-text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .rpm-tab:focus-visible,
    .rpm-button:focus-visible,
    .rpm-select-control:focus-visible,
    .rpm-choice-card:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--portal-primary) 18%, transparent);
      outline-offset: 2px;
    }

    .rpm-tab:last-child {
      border-right: 0;
    }

    .rpm-tab.is-active {
      background: var(--portal-surface);
      color: var(--portal-primary);
      box-shadow: inset 0 -2px 0 var(--portal-primary);
    }

    .rpm-workbench-body {
      padding: 22px;
    }

    .rpm-section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .rpm-section-title {
      margin: 0;
      font-size: 1.28rem;
      line-height: 1.2;
      font-weight: 800;
      color: var(--portal-text);
    }

    .rpm-section-copy {
      margin: 5px 0 0;
      color: var(--portal-text-muted);
      font-size: 0.94rem;
    }

    .rpm-form-grid {
      display: grid;
      grid-template-columns: minmax(180px, 0.42fr) minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .rpm-field {
      display: grid;
      gap: 6px;
    }

    .rpm-label {
      color: var(--portal-text);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .rpm-input,
    .rpm-select,
    .rpm-textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
      color: var(--portal-text);
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .rpm-textarea {
      min-height: 92px;
      resize: vertical;
    }

    .rpm-input:focus,
    .rpm-select:focus,
    .rpm-textarea:focus {
      border-color: var(--portal-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--portal-primary) 15%, transparent);
    }

    .rpm-button {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      color: #fff;
      background: var(--portal-primary);
      white-space: nowrap;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .rpm-button:hover:not(:disabled) {
      background: var(--portal-primary-hover);
      transform: translateY(-1px);
    }

    .rpm-button.secondary {
      color: var(--portal-text);
      background: var(--portal-surface);
      border-color: var(--rpm-line);
    }

    .rpm-button.secondary:hover:not(:disabled) {
      background: color-mix(in srgb, var(--portal-text) 5%, var(--portal-surface));
    }

    .rpm-button.danger {
      background: var(--rpm-red);
      color: #fff;
    }

    .rpm-button.ghost {
      border-color: transparent;
      color: var(--portal-primary);
      background: transparent;
    }

    .rpm-button.full {
      width: 100%;
    }

    .rpm-error,
    .rpm-success,
    .rpm-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 12px 0 0;
      padding: 11px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .rpm-error {
      border: 1px solid color-mix(in srgb, var(--rpm-red) 25%, #fecaca);
      background: var(--rpm-red-bg);
      color: var(--rpm-red);
    }

    .rpm-success {
      border: 1px solid color-mix(in srgb, var(--rpm-green) 25%, #bbf7d0);
      background: var(--rpm-green-bg);
      color: var(--rpm-green);
    }

    .rpm-note {
      border: 1px solid color-mix(in srgb, var(--rpm-blue) 20%, #bfdbfe);
      background: var(--rpm-blue-bg);
      color: var(--rpm-blue);
    }

    .rpm-results {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .rpm-result-card {
      padding: 16px;
      box-shadow: none;
    }

    .rpm-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .rpm-card-title {
      margin: 0;
      color: var(--portal-text);
      font-size: 1rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .rpm-card-meta {
      margin: 3px 0 0;
      color: var(--portal-text-muted);
      font-size: 0.84rem;
    }

    .rpm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--rpm-line);
      background: var(--portal-surface);
      color: var(--portal-text-muted);
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .rpm-badge.ok {
      background: var(--rpm-green-bg);
      color: var(--rpm-green);
      border-color: color-mix(in srgb, var(--rpm-green) 24%, #bbf7d0);
    }

    .rpm-badge.info {
      background: var(--rpm-blue-bg);
      color: var(--rpm-blue);
      border-color: color-mix(in srgb, var(--rpm-blue) 24%, #bfdbfe);
    }

    .rpm-badge.warn {
      background: var(--rpm-amber-bg);
      color: var(--rpm-amber);
      border-color: #fde68a;
    }

    .rpm-badge.danger {
      background: var(--rpm-red-bg);
      color: var(--rpm-red);
      border-color: #fecaca;
    }

    .rpm-kv-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .rpm-kv {
      min-height: 64px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      padding: 10px;
      background: color-mix(in srgb, var(--portal-bg) 45%, var(--portal-surface));
    }

    .rpm-kv span {
      display: block;
      color: var(--portal-text-muted);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .rpm-kv strong {
      display: block;
      margin-top: 2px;
      color: var(--portal-text);
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .rpm-items {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .rpm-item-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
    }

    .rpm-selectable-row {
      grid-template-columns: minmax(104px, auto) 58px minmax(0, 1fr) auto;
    }

    .rpm-item-row.is-disabled {
      background: color-mix(in srgb, var(--portal-text) 4%, var(--portal-surface));
    }

    .rpm-select-control {
      min-height: 38px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      padding: 8px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--portal-surface);
      color: var(--portal-text);
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .rpm-select-control[data-checked] {
      border-color: color-mix(in srgb, var(--portal-primary) 45%, var(--rpm-line));
      background: color-mix(in srgb, var(--portal-primary) 8%, var(--portal-surface));
      color: var(--portal-primary);
    }

    .rpm-select-control:disabled {
      background: color-mix(in srgb, var(--portal-text) 4%, var(--portal-surface));
      color: var(--portal-text-muted);
      cursor: not-allowed;
    }

    .rpm-select-box {
      width: 18px;
      height: 18px;
      border: 1px solid currentColor;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .rpm-thumb {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      border: 1px solid var(--rpm-line);
      background: color-mix(in srgb, var(--portal-bg) 70%, #fff);
      object-fit: cover;
    }

    .rpm-thumb-placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--portal-text-muted);
    }

    .rpm-item-title {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--portal-text);
      overflow-wrap: anywhere;
    }

    .rpm-item-meta {
      margin: 2px 0 0;
      color: var(--portal-text-muted);
      font-size: 0.8rem;
    }

    .rpm-item-status {
      margin: 6px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--rpm-amber);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .rpm-skeleton {
      display: grid;
      gap: 10px;
    }

    .rpm-skeleton-line {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--portal-border), color-mix(in srgb, var(--portal-surface) 70%, #fff), var(--portal-border));
      background-size: 200% 100%;
      animation: rpm-shimmer 1.2s linear infinite;
    }

    .rpm-loading-note {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: var(--portal-text-muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .rpm-spin {
      animation: rpm-spin 0.8s linear infinite;
    }

    @keyframes rpm-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes rpm-shimmer {
      from {
        background-position: 200% 0;
      }
      to {
        background-position: -200% 0;
      }
    }

    .rpm-stepper {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .rpm-step {
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      padding: 10px;
      color: var(--portal-text-muted);
      background: color-mix(in srgb, var(--portal-bg) 48%, var(--portal-surface));
      font-size: 0.82rem;
      font-weight: 800;
    }

    .rpm-step.is-active {
      color: var(--portal-primary);
      border-color: color-mix(in srgb, var(--portal-primary) 38%, var(--rpm-line));
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
    }

    .rpm-two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.42fr);
      gap: 14px;
      align-items: start;
    }

    .rpm-stack {
      display: grid;
      gap: 12px;
    }

    .rpm-upload {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 132px;
      border: 2px dashed color-mix(in srgb, var(--portal-primary) 42%, var(--rpm-line));
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-primary) 6%, var(--portal-surface));
      color: var(--portal-text);
      text-align: center;
      padding: 18px;
    }

    .rpm-upload strong {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
    }

    .rpm-upload em {
      font-style: normal;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--rpm-red-bg);
      color: var(--rpm-red);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .rpm-upload input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .rpm-choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .rpm-choice-card {
      min-height: 78px;
      border: 1px solid var(--rpm-line);
      border-radius: 8px;
      background: var(--portal-surface);
      color: var(--portal-text);
      padding: 12px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      text-align: left;
      cursor: pointer;
    }

    .rpm-choice-card[data-checked] {
      border-color: color-mix(in srgb, var(--portal-primary) 45%, var(--rpm-line));
      background: color-mix(in srgb, var(--portal-primary) 7%, var(--portal-surface));
      color: var(--portal-primary);
    }

    .rpm-choice-card strong,
    .rpm-choice-card small {
      display: block;
    }

    .rpm-choice-card small {
      margin-top: 2px;
      color: var(--portal-text-muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .rpm-choice-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid currentColor;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .rpm-footer-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .rpm-empty {
      display: grid;
      place-items: center;
      min-height: 190px;
      text-align: center;
      color: var(--portal-text-muted);
      border: 1px dashed var(--rpm-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--portal-bg) 54%, var(--portal-surface));
      padding: 24px;
    }

    .rpm-toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: min(420px, calc(100vw - 36px));
      color: var(--portal-text);
    }

    @media (max-width: 900px) {
      .rpm-hero-main,
      .rpm-two-col,
      .rpm-form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .rpm-shell {
        width: min(100% - 20px, 1120px);
        padding-top: 14px;
      }

      .rpm-topbar,
      .rpm-section-head,
      .rpm-card-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .rpm-locale {
        display: none;
      }

      .rpm-hero-main,
      .rpm-workbench-body {
        padding: 16px;
      }

      .rpm-kv-grid,
      .rpm-stepper,
      .rpm-choice-grid,
      .rpm-item-row {
        grid-template-columns: 1fr;
      }

      .rpm-tabs {
        grid-template-columns: 1fr;
      }

      .rpm-tab {
        justify-content: flex-start;
        border-right: 0;
        border-bottom: 1px solid var(--rpm-line);
      }

      .rpm-tab:last-child {
        border-bottom: 0;
      }

      .rpm-footer-actions .rpm-button,
